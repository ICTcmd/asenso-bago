<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>You're Offline — Asenso Bago</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }
    .seal {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
      opacity: 0.6;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .brand {
      margin-top: 28px;
      font-size: 13px;
      color: #94a3b8;
    }
    .brand strong { color: #c0392b; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/images/bago-city-logo.png" alt="Bago City Seal" class="seal" />
    <h1>You're Offline</h1>
    <p>
      It looks like you don't have an internet connection right now.
      Please check your Wi-Fi or mobile data and try again.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <p class="brand">
      <strong>Asenso Bago</strong><br>
      City of Bago, Negros Occidental
    </p>
  </div>
</body>
</html>
