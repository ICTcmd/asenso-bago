<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bago City Interactive Map</title>
<link rel="preconnect" href="https://api.mapbox.com">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.hdr{background:linear-gradient(135deg,#6b2200,#a03800);padding:max(14px,env(safe-area-inset-top)) 16px 14px;display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.bk{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.hi{flex:1}.hi h1{font-size:16px;font-weight:800;color:#fff}.hi p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.hdr img{width:36px;height:36px;border-radius:50%}
#map{position:fixed;top:0;left:0;right:0;bottom:0}
#loader{position:fixed;inset:0;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;transition:opacity .5s}
#loader.done{opacity:0;pointer-events:none}
#loader img{width:72px;height:72px;border-radius:50%;box-shadow:0 0 30px rgba(160,56,0,.5)}
#loader h2{font-size:18px;font-weight:900;color:#fff}
#loader p{font-size:12px;color:rgba(255,255,255,.4)}
.bw{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#6b2200,#f39c12);animation:bf 1.5s ease forwards}
@keyframes bf{0%{width:0}100%{width:95%}}
.mapboxgl-ctrl-bottom-right{bottom:100px!important;right:12px!important}
.mapboxgl-ctrl-attrib{font-size:9px!important}
/* Barangay marker */
.brgy-marker{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
  cursor:pointer;border:3px solid #fff;
  box-shadow:0 3px 12px rgba(0,0,0,.5);
  transition:transform .2s,box-shadow .2s;
  line-height:1.1;text-align:center;
}
.brgy-marker:hover{transform:scale(1.2);box-shadow:0 6px 20px rgba(0,0,0,.6)}
.brgy-marker.u{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.brgy-marker.r{background:linear-gradient(135deg,#27ae60,#1e8449)}
.brgy-marker.t{background:linear-gradient(135deg,#f39c12,#e67e22)}
/* Tourist marker */
.spot-marker{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#6b2200,#c0392b);
  border:2.5px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.55);
  transition:transform .15s,box-shadow .15s;
}
.spot-marker:hover{transform:scale(1.3);box-shadow:0 6px 20px rgba(0,0,0,.65)}
/* FABs */
.fabs{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:90}
.fab{padding:11px 18px;border-radius:24px;border:none;cursor:pointer;font-size:12px;font-weight:800;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.5);white-space:nowrap;transition:transform .15s;display:flex;align-items:center;gap:6px}
.fab:active{transform:scale(0.96)}
.f3d{background:rgba(20,20,20,.92);backdrop-filter:blur(8px);border:1px solid #444}
.fhome{background:linear-gradient(135deg,#6b2200,#a03800)}
/* Legend */
.leg{position:fixed;top:82px;left:12px;background:rgba(10,10,15,.88);backdrop-filter:blur(8px);border-radius:12px;padding:10px 13px;z-index:90;border:1px solid rgba(255,255,255,.08);font-size:11px}
.li{display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#ccc;font-weight:600}
.li:last-child{margin:0}
.ld{width:13px;height:13px;border-radius:50%;flex-shrink:0}
/* Info Panel */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:299;display:none;backdrop-filter:blur(8px)}
.ov.on{display:block}
.pan{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#1c1c1e;border-radius:24px 24px 0 0;padding:20px 20px 40px;z-index:300;display:none;border-top:3px solid #a03800;box-shadow:0 -8px 40px rgba(0,0,0,.8);max-height:75vh;overflow-y:auto}
.pan.on{display:block;animation:sup .3s cubic-bezier(.2,.8,.3,1)}
@keyframes sup{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.ph{width:38px;height:4px;background:#3a3a3c;border-radius:2px;margin:0 auto 16px}
.pc{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:#2c2c2e;border:none;color:#aaa;font-size:20px;cursor:pointer;line-height:30px;text-align:center}
#pname{font-size:21px;font-weight:900;color:#fff;margin-bottom:5px}
#ptype{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
#pdesc{font-size:13px;color:#999;line-height:1.65;margin-bottom:10px}
.pr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fp{background:#1a3050;color:#74b9ff;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.sp{background:#3d1500;color:#fdcb6e;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.gm{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:14px;background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;border-radius:12px;font-size:13px;font-weight:700;text-decoration:none}
</style>
</head>
<body>

<div id="loader">
  <img src="assets/images/bago-city-logo.png" alt="">
  <h2>Bago City 3D Map</h2>
  <p>Loading...</p>
  <div class="bw"><div class="bf"></div></div>
</div>

<div id="map"></div>

<div class="hdr">
  <a href="javascript:history.back()" class="bk">&#8592;</a>
  <div class="hi"><h1>Bago City Interactive Map</h1><p>Tap any marker for details</p></div>
  <img src="assets/images/bago-city-logo.png" alt="">
</div>

<div class="leg">
  <div class="li"><div class="ld" style="background:#e74c3c"></div>Urban Barangay</div>
  <div class="li"><div class="ld" style="background:#27ae60"></div>Rural Barangay</div>
  <div class="li"><div class="ld" style="background:#f39c12"></div>Has Tourist Spot</div>
  <div class="li"><div class="ld" style="background:#a03800"></div>Landmark</div>
</div>

<div class="fabs">
  <button class="fab f3d" id="btn3d" onclick="toggle3D()">⬛ Enable 3D</button>
  <button class="fab fhome" onclick="resetView()">🎯 Bago City</button>
</div>

<div class="ov" id="ov" onclick="hide()"></div>
<div class="pan" id="pan">
  <button class="pc" onclick="hide()">&#215;</button>
  <div class="ph"></div>
  <div id="pname"></div>
  <span id="ptype"></span>
  <p id="pdesc"></p>
  <div class="pr" id="pfacts"></div>
  <div class="pr" id="pspots"></div>
  <a class="gm" id="pgm" href="#" target="_blank" rel="noopener">📍 View on Google Maps</a>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiaWN0YmFnbyIsImEiOiJjbXB5czIxNzYwNGozMnJwdWRxbzltaml0In0.bB042ep_ICri40J2x2pPow';

const CENTER = [122.838, 10.510];
const BOUNDS = [[122.67, 10.29], [123.02, 10.64]];
let is3D = false;

// All 24 barangays — coordinates verified against Mapbox Streets map labels
const BARANGAYS = [
  // NORTH ROW (border with Bacolod/Murcia)
  {num:'24',name:'Taloc',              type:'u',lng:122.832,lat:10.612,dist:'—',       area:'—',       pop:'—',     fiesta:'—',                               desc:'An urban barangay in the northwest bordering Bacolod City.',spots:''},
  {num:'23',name:'Tabunan',            type:'r',lng:122.88,lat:10.612,dist:'—',       area:'—',       pop:'—',     fiesta:'—',                               desc:'A rural barangay in the north with mangrove forests and rice fields.',spots:''},
  {num:'12',name:'Dulao',              type:'r',lng:122.905,lat:10.6,dist:'17.8 km', area:'2,439 ha',pop:'10,111',fiesta:'Hataw Dance Festival (Dec 8)',     desc:'A rural barangay traversed by the Bago River with fertile agricultural land.',spots:''},
  {num:'01',name:'Abuanan',            type:'u',lng:122.958,lat:10.552,dist:'25 km',   area:'1,040 ha',pop:'5,700', fiesta:'Hublag Festival (Last Sat Feb)',   desc:'An urban barangay in the northeast, known for quarries, rice mills and the Abuanan Elementary School.',spots:''},
  {num:'04',name:'Bacong-Montilla',    type:'r',lng:122.972,lat:10.568,dist:'29.50 km',area:'4,827 ha',pop:'7,844', fiesta:'Lumbayag Festival (Mar 26)',       desc:'The largest barangay by land area in Bago City. Vast agricultural and forest lands bordering Murcia.',spots:''},
  // SECOND ROW
  {num:'09',name:'Calumangan',         type:'r',lng:122.772,lat:10.588,dist:'6.40 km', area:'1,007 ha',pop:'7,979', fiesta:'Kalumangan Festival (May 15)',     desc:'A rural barangay in the northwest known for rice mills and the Bago River watershed.',spots:''},
  {num:'08',name:'Busay',              type:'t',lng:122.855,lat:10.552,dist:'7.26 km', area:'1,463 ha',pop:'6,896', fiesta:'Sinadya Festival (Mar 3)',         desc:'A rural barangay stretching from lowlands to upland areas with scenic mountain views.',spots:'⭐ Buenos Aires Mountain Resort|⭐ Kinutkot Resort'},
  {num:'17',name:'Malingin',           type:'r',lng:122.875,lat:10.535,dist:'12.20 km',area:'1,495 ha',pop:'6,649', fiesta:'Palakad Festival (Mar 19)',       desc:'A rural barangay in the central area known for rice mills and farming communities.',spots:''},
  {num:'03',name:'Atipuluan',          type:'u',lng:122.903,lat:10.528,dist:'17.46 km',area:'562 ha',  pop:'4,269', fiesta:'Pasiduong Festival (May 15)',      desc:'An urban barangay along the main Negros South Road — key commercial and residential hub.',spots:''},
  {num:'22',name:'Sampinit',           type:'r',lng:122.96,lat:10.48,dist:'11 km',   area:'553 ha',  pop:'6,856', fiesta:'Sinadya Festival (Mar 3)',         desc:'A rural barangay east of city center, bordering Mt. Kanlaon Natural Park.',spots:''},
  // CITY CENTER ROW
  {num:'06',name:'Balingasag',         type:'u',lng:122.808,lat:10.538,dist:'1.25 km', area:'436 ha',  pop:'4,498', fiesta:'Zumbali Festival (May 31)',        desc:'An urban barangay near the city center with commercial establishments and health center.',spots:''},
  {num:'18',name:'Napoles',            type:'r',lng:122.838,lat:10.548,dist:'9.26 km', area:'1,279 ha',pop:'6,564', fiesta:'Kasalipan Festival (Mar 30)',      desc:'A rural barangay known for its rice mills and rice fields.',spots:''},
  {num:'20',name:'Poblacion',          type:'t',lng:122.833,lat:10.497,dist:'0 km',    area:'311 ha',  pop:'11,794',fiesta:'Fiesta of San Sebastian (Jan)',    desc:'Main downtown — seat of local government. Smallest land area (311 ha).',spots:'⭐ Bantayan Park (1898 Revolution)|⭐ Balay ni Tan Juan|⭐ Bago City Cathedral|⭐ Javellana Mansion'},
  {num:'14',name:'Lag-Asan',           type:'r',lng:122.85,lat:10.472,dist:'1.60 km', area:'456 ha',  pop:'11,794',fiesta:'Simadya Festival (Mar 3)',         desc:'A rural barangay south of Poblacion, known for the Hundred Hills Nature Resort.',spots:'⭐ Hundred Hills Nature Resort'},
  {num:'15',name:'Ma-ao',              type:'t',lng:122.918,lat:10.462,dist:'21.70 km',area:'5,998 ha',pop:'14,916',fiesta:'Mabaw-Malaw Festival (Dec 30)',    desc:'Most populated barangay (14,916 residents). Home to the historic Ma-ao Sugar Central.',spots:'⭐ Ma-ao Sugar Central|⭐ MSC Ruins (Lacson Mansion)'},
  {num:'07',name:'Binubuhan',          type:'r',lng:122.935,lat:10.435,dist:'29.50 km',area:'2,352 ha',pop:'5,581', fiesta:'Lechon Festival (Apr 17)',         desc:'A rural barangay in Cluster 8 with Ma-ao and Mailum.',spots:''},
  // SOUTH ROW
  {num:'19',name:'Pacol',              type:'r',lng:122.788,lat:10.512,dist:'7.20 km', area:'—',       pop:'3,999', fiesta:'December 12',                     desc:'A rural barangay near the city center with the Pacol Gym and health center.',spots:''},
  {num:'10',name:'Caridad',            type:'u',lng:122.808,lat:10.5,dist:'12 km',   area:'—',       pop:'4,901', fiesta:'Dinagaw Festival (2nd Sat Mar)',   desc:'An urban barangay forming part of the Bago City urban core.',spots:''},
  {num:'11',name:'Don Jorge L. Araneta',type:'u',lng:122.842,lat:10.47,dist:'16.90 km',area:'2,143 ha',pop:'9,457',fiesta:'Manupak-tapas Festival (Dec 8)',  desc:'Named after Gen. Juan A. Araneta who led the bloodless revolution of November 5, 1898.',spots:'⭐ Araneta Heritage Site'},
  {num:'02',name:'Alianza',            type:'r',lng:122.82,lat:10.478,dist:'15 km',   area:'365 ha',  pop:'3,211', fiesta:'February 2',                      desc:'A rural barangay known for agricultural lands and rice production.',spots:''},
  {num:'05',name:'Bagroy',             type:'r',lng:122.73,lat:10.494,dist:'11 km',   area:'399 ha',  pop:'1,694', fiesta:'February 11',                     desc:'Smallest population (1,694). A coastal barangay along the Guimaras Strait.',spots:''},
  {num:'21',name:'Sagasa',             type:'r',lng:122.748,lat:10.472,dist:'—',       area:'—',       pop:'—',     fiesta:'—',                               desc:'A coastal rural barangay along the Guimaras Strait known for fishing and mangrove forests.',spots:''},
  {num:'16',name:'Mailum',             type:'t',lng:122.928,lat:10.395,dist:'29.46 km',area:'3,200 ha',pop:'8,844', fiesta:'Ginom-Ginom Festival (Mar 19)',   desc:'Prime ecotourism destination at the foot of Mt. Kanlaon. Home to Kipot Twin Falls.',spots:'⭐ Kipot Twin Falls (220 steps)|⭐ Pataan Mountain Resort'},
  {num:'13',name:'Ilijan',             type:'t',lng:122.86,lat:10.392,dist:'36.99 km',area:'1,489 ha',pop:'5,581', fiesta:'December 11',                     desc:'Farthest barangay (36.99 km). Coastal. President Quezon stayed here in 1942.',spots:'⭐ WWII Historical Site (Pres. Quezon 1942)'},
];
// Tourist landmarks
const SPOTS = [
  {name:'Bantayan Park',             icon:'🏛️',lng:122.8342,lat:10.4982,desc:'Historic riverside park — site of the November 5, 1898 bloodless revolution led by Gen. Juan Araneta against Spanish rule.',spots:'⭐ Al Cinco de Noviembre annual celebration'},
  {name:'Bago City Cathedral',       icon:'⛪',lng:122.8330,lat:10.4972,desc:'Spanish-colonial cathedral dedicated to San Sebastian, patron saint of Bago City. One of the oldest landmarks in the city.',spots:'⭐ Religious heritage landmark'},
  {name:'Javellana Mansion (Balay Daku)',icon:'🏰',lng:122.8298,lat:10.4948,desc:'Built in 1920 on a 440-ha sugar plantation by the Javellana family, designed by an Italian architect. One of Bago Citys most prized heritage landmarks.',spots:'⭐ Heritage ancestral house tour'},
  {name:'Balay ni Tan Juan',         icon:'🏡',lng:122.8315,lat:10.4960,desc:'A well-preserved ancestral house that offers a glimpse into the rich cultural heritage and history of Bago City and its founding families.',spots:'⭐ Heritage museum & cultural site'},
  {name:'Ma-ao Sugar Central (MSC)', icon:'🏭',lng:122.8952,lat:10.4598,desc:'Historic sugar mill — the Ma-ao Sugar Central. A heritage industrial landmark in the most populated barangay of Bago City.',spots:'⭐ MSC Heritage site|⭐ Lacson Mansion ruins'},
  {name:'Kipot Twin Falls',          icon:'💧',lng:122.8980,lat:10.3978,desc:'Stunning twin waterfalls in Brgy. Mailum at the foot of Mt. Kanlaon. Reached via 220 steps. Cold, refreshing water — perfect for family trips and nature lovers.',spots:'⭐ Nature ecotourism destination'},
  {name:'Pataan Mountain Resort',    icon:'🏔️',lng:122.9120,lat:10.3950,desc:'Mountain getaway near Kanlaon Volcano with scenic views, fresh mountain air and proximity to Kipot Twin Falls.',spots:'⭐ Mountain resort & eco-adventure'},
  {name:'Buenos Aires Mtn Resort',   icon:'⛰️',lng:122.8482,lat:10.5428,desc:'Scenic mountain resort in Brgy. Busay with breathtaking panoramic views of Bago City and the surrounding landscape.',spots:'⭐ Mountain resort & hiking'},
  {name:'Kinutkot Resort',           icon:'🌊',lng:122.8320,lat:10.5200,desc:'Popular resort destination in Bago City known for its spring water and recreational facilities.',spots:'⭐ Swimming resort & recreation'},
  {name:'Hundred Hills Nature Resort',icon:'🌿',lng:122.8362,lat:10.4742,desc:'Nature resort with rolling hills and lush greenery south of the city proper. A relaxing nature getaway for families.',spots:'⭐ Nature resort & scenic hills'},
  {name:'Rafael Salas Park',         icon:'🌳',lng:122.8340,lat:10.4985,desc:'Named after Rafael Salas — UN Under-Secretary General and native son of Bago City. A nature center and green sanctuary for families.',spots:'⭐ Nature park & city green space'},
];

// City of Bago boundary polygon (from OSM data)
const BAGO_BOUNDARY = [
  [122.6932,10.5342],[122.6980,10.5580],[122.7050,10.5750],[122.7180,10.5920],
  [122.7380,10.6100],[122.7650,10.6220],[122.8080,10.6220],[122.8480,10.6180],
  [122.8900,10.6150],[122.9380,10.6100],[122.9800,10.5980],[123.0020,10.5450],
  [122.9950,10.5020],[122.9780,10.4550],[122.9620,10.4150],[122.9420,10.3800],
  [122.9200,10.3520],[122.8900,10.3250],[122.8600,10.3100],[122.8300,10.3080],
  [122.8050,10.3150],[122.7820,10.3280],[122.7600,10.3500],[122.7400,10.3750],
  [122.7200,10.4050],[122.7020,10.4350],[122.6920,10.4680],[122.6870,10.4980],
  [122.6890,10.5180],[122.6932,10.5342]
];

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: CENTER,
  zoom: 11.5,
  minZoom: 10.5,
  maxZoom: 17,
  maxBounds: BOUNDS,
});

map.setPadding({top:66, bottom:100});
map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}), 'bottom-right');

map.on('load', () => {
  // Hide loader
  const l = document.getElementById('loader');
  l.classList.add('done');
  setTimeout(()=>l.style.display='none', 500);

  // 3D terrain — Mt. Kanlaon will visibly rise
  map.addSource('dem', {type:'raster-dem', url:'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize:512});
  map.setTerrain({source:'dem', exaggeration:1.8});
  map.setFog({
    color:'rgb(186,210,235)',
    'high-color':'rgb(36,92,223)',
    'horizon-blend':0.02,
    'space-color':'rgb(11,11,25)',
    'star-intensity':0.4
  });

  // Bago City boundary highlight
  map.addSource('boundary', {
    type:'geojson',
    data:{
      type:'Feature',
      geometry:{type:'Polygon', coordinates:[BAGO_BOUNDARY]}
    }
  });
  map.addLayer({
    id:'boundary-fill',
    type:'fill',
    source:'boundary',
    paint:{
      'fill-color':'#a03800',
      'fill-opacity':0.04
    }
  });
  map.addLayer({
    id:'boundary-line',
    type:'line',
    source:'boundary',
    paint:{
      'line-color':'#a03800',
      'line-width':2.5,
      'line-dasharray':[4,3],
      'line-opacity':0.8
    }
  });

  // Barangay markers
  BARANGAYS.forEach(b => {
    const el = document.createElement('div');
    el.className = `brgy-marker ${b.type}`;
    el.textContent = b.num;
    el.title = b.name;
    el.onclick = () => showInfo(b);
    new mapboxgl.Marker({element:el, anchor:'center'})
      .setLngLat([b.lng, b.lat])
      .addTo(map);
  });

  // Tourist spot markers
  SPOTS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'spot-marker';
    el.textContent = s.icon;
    el.title = s.name;
    el.onclick = () => showInfo({
      name:s.name, type:'landmark',
      desc:s.desc, spots:s.spots,
      dist:'', pop:'', area:'', fiesta:''
    });
    new mapboxgl.Marker({element:el, anchor:'center'})
      .setLngLat([s.lng, s.lat])
      .addTo(map);
  });
});

function toggle3D() {
  is3D = !is3D;
  const btn = document.getElementById('btn3d');
  if (is3D) {
    map.easeTo({pitch:55, bearing:-15, duration:1000});
    btn.innerHTML = '⬜ Disable 3D';
    btn.style.background = 'linear-gradient(135deg,#1a3050,#0369a1)';
    btn.style.border = 'none';
  } else {
    map.easeTo({pitch:0, bearing:0, duration:800});
    btn.innerHTML = '⬛ Enable 3D';
    btn.style.background = 'rgba(20,20,20,.92)';
    btn.style.border = '1px solid #444';
  }
}

function resetView() {
  map.flyTo({center:CENTER, zoom:11.5, pitch:is3D?55:0, bearing:is3D?-15:0, duration:1200});
}

function showInfo(p) {
  document.getElementById('pname').textContent = p.name;
  const t = document.getElementById('ptype');
  const u = p.type==='u', lm = p.type==='landmark';
  t.textContent = u ? '🏙️ Urban Barangay' : lm ? '📍 Landmark / Tourist Spot' : p.type==='t' ? '🌿 Rural · Tourist Spot' : '🌿 Rural Barangay';
  t.style.background = u ? 'rgba(231,76,60,.2)' : lm ? 'rgba(230,126,34,.2)' : p.type==='t' ? 'rgba(243,156,18,.2)' : 'rgba(39,174,96,.2)';
  t.style.color = u ? '#ff7675' : lm ? '#fdcb6e' : p.type==='t' ? '#fdcb6e' : '#55efc4';
  document.getElementById('pdesc').textContent = p.desc || '';
  const f = [];
  if (p.num) f.push('🔢 Barangay No. ' + p.num);
  if (p.dist && p.dist!=='—') f.push('📍 '+p.dist+' from city');
  if (p.pop  && p.pop !=='—') f.push('👥 Pop. '+p.pop);
  if (p.area && p.area!=='—') f.push('📐 '+p.area);
  if (p.fiesta && p.fiesta!=='—') f.push('🎉 '+p.fiesta);
  document.getElementById('pfacts').innerHTML = f.map(x=>`<span class="fp">${x}</span>`).join('');
  document.getElementById('pspots').innerHTML = p.spots ? p.spots.split('|').map(s=>`<span class="sp">${s}</span>`).join('') : '';
  document.getElementById('pgm').href = 'https://maps.google.com/?q='+encodeURIComponent(p.name+' Bago City Negros Occidental Philippines');
  document.getElementById('pan').classList.add('on');
  document.getElementById('ov').classList.add('on');
}

function hide() {
  document.getElementById('pan').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}
</script>
</body>
</html>
