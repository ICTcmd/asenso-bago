<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; overflow: hidden; height: 100vh; }

  /* Header */
  .hdr {
    background: linear-gradient(135deg, #6b2200, #a03800);
    padding: max(16px, env(safe-area-inset-top)) 16px 14px;
    display: flex; align-items: center; gap: 12px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .bk {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.15); border: none;
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }
  .hi { flex: 1; }
  .hi h1 { font-size: 16px; font-weight: 800; color: #fff; }
  .hi p  { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 1px; }
  .hdr img { width: 36px; height: 36px; border-radius: 50%; }

  /* Map */
  #map {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    /* will be pushed down by header height via JS */
  }

  /* Mapbox overrides */
  .mapboxgl-ctrl-bottom-right { bottom: 90px; }
  .mapboxgl-ctrl-attrib { font-size: 9px; }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 100px; left: 12px;
    background: rgba(20,20,20,0.88);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 10px 14px;
    z-index: 50;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .legend-title { font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
  .leg { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 11px; font-weight: 600; color: #ddd; }
  .leg:last-child { margin-bottom: 0; }
  .ld { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

  /* Info Panel */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 199; display: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.on { display: block; }

  .panel {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 520px;
    background: #1c1c1e;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px;
    box-shadow: 0 -8px 48px rgba(0,0,0,.8);
    z-index: 200; display: none;
    border-top: 3px solid #a03800;
    max-height: 85vh;
    overflow-y: auto;
  }
  .panel.on {
    display: block;
    animation: slideup .32s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes slideup {
    from { transform: translateX(-50%) translateY(100%); }
    to   { transform: translateX(-50%) translateY(0); }
  }
  .panel-handle {
    width: 38px; height: 4px;
    background: #3a3a3c; border-radius: 2px;
    margin: 0 auto 18px;
  }
  .panel-close {
    position: absolute; top: 18px; right: 18px;
    width: 30px; height: 30px; border-radius: 50%;
    background: #2c2c2e; border: none;
    color: #aaa; font-size: 20px; cursor: pointer;
    line-height: 30px; text-align: center;
  }
  #pname { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 5px; line-height: 1.2; }
  #ptype {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 4px 13px; border-radius: 20px; margin-bottom: 13px;
  }
  #pdesc { font-size: 13px; color: #999; line-height: 1.65; margin-bottom: 12px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .fp { background: #1a3050; color: #74b9ff; font-size: 10px; font-weight: 700; padding: 5px 11px; border-radius: 20px; }
  .sp { background: #3d1500; color: #fdcb6e; font-size: 10px; font-weight: 700; padding: 5px 11px; border-radius: 20px; }
  .gm-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 14px; padding: 14px;
    background: linear-gradient(135deg, #0369a1, #0ea5e9);
    color: #fff; border-radius: 12px;
    font-size: 13px; font-weight: 700; text-decoration: none;

    source: 'barangays',
    paint: {
      'fill-color': ['get', 'fillColor'],
      'fill-opacity': 0.38,
    }
  });

  map.addLayer({
    id: 'barangay-fill-hover',
    type: 'fill',
    source: 'barangays',
    paint: {
      'fill-color': ['get', 'fillColor'],
      'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.72, 0],
    }
  });

  map.addLayer({
    id: 'barangay-outline',
    type: 'line',
    source: 'barangays',
    paint: {
      'line-color': ['get', 'outlineColor'],
      'line-width': 1.8,
      'line-opacity': 0.8,
    }
  });

  map.addLayer({
    id: 'barangay-labels',
    type: 'symbol',
    source: 'barangays',
    layout: {
      'text-field': ['get', 'name'],
      'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
      'text-size': ['interpolate', ['linear'], ['zoom'], 11, 9, 14, 13],
      'text-anchor': 'center',
      'text-max-width': 8,
    },
    paint: {
      'text-color': '#fff',
      'text-halo-color': 'rgba(0,0,0,0.75)',
      'text-halo-width': 1.5,
    }
  });

  // Hover state
  let hoveredId = null;
  map.on('mousemove', 'barangay-fill', e => {
    map.getCanvas().style.cursor = 'pointer';
    if (e.features.length > 0) {
      if (hoveredId !== null) map.setFeatureState({ source:'barangays', id: hoveredId }, { hover: false });
      hoveredId = e.features[0].id;
      map.setFeatureState({ source:'barangays', id: hoveredId }, { hover: true });
    }
  });
  map.on('mouseleave', 'barangay-fill', () => {
    map.getCanvas().style.cursor = '';
    if (hoveredId !== null) map.setFeatureState({ source:'barangays', id: hoveredId }, { hover: false });
    hoveredId = null;
  });

  // Click barangay
  map.on('click', 'barangay-fill', e => {
    const p = e.features[0].properties;
    showPanel(p.name, p.type==='u'?'Urban':p.type==='r'?'Rural':'Rural', p.desc, p.facts, p.spots);
  });

  // Add landmark markers
  landmarks.forEach(lm => {
    const el = document.createElement('div');
    el.style.cssText = `
      width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,#6b2200,#a03800);
      border:2.5px solid #fff;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;cursor:pointer;
      box-shadow:0 3px 12px rgba(0,0,0,0.5);
    `;
    el.textContent = lm.icon;
    el.title = lm.name;
    el.addEventListener('click', e => {
      e.stopPropagation();
      showPanel(lm.name, 'Landmark', lm.desc, '', lm.spots);
    });
    new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lm.lng, lm.lat])
      .addTo(map);
  });

  // Zoom controls
  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

});

function showPanel(name, type, desc, facts, spots) {
  document.getElementById('pname').textContent = name;
  const t = document.getElementById('ptype');
  const u = type === 'Urban', r = type === 'Rural';
  t.textContent = u ? '🏙️ Urban Barangay' : r ? '🌿 Rural Barangay' : '📍 ' + type;
  t.style.background = u ? 'rgba(231,76,60,0.2)' : r ? 'rgba(39,174,96,0.2)' : 'rgba(230,126,34,0.2)';
  t.style.color = u ? '#ff7675' : r ? '#55efc4' : '#fdcb6e';
  document.getElementById('pdesc').textContent = desc;
  document.getElementById('pfacts').innerHTML = facts
    ? facts.split('|').map(f => `<span class="fp">📊 ${f}</span>`).join('') : '';
  document.getElementById('pspots').innerHTML = spots
    ? spots.split('|').map(s => `<span class="sp">${s}</span>`).join('') : '';
  document.getElementById('pgm').href =
    'https://maps.google.com/?q=' + encodeURIComponent(name + ' Bago City Negros Occidental Philippines');
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}

function hidePanel() {
  document.getElementById('panel').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}
</script>
</body>
</html>
