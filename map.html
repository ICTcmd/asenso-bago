<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bago City Interactive Map</title>
<link rel="preconnect" href="https://api.mapbox.com">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.hdr{background:linear-gradient(135deg,#6b2200,#a03800);padding:max(14px,env(safe-area-inset-top)) 16px 14px;display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.bk{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.hi{flex:1}.hi h1{font-size:16px;font-weight:800;color:#fff}.hi p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.hdr img{width:36px;height:36px;border-radius:50%}

/* Search bar */
.search-bar{position:fixed;top:72px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:440px;z-index:95;display:flex;gap:8px}
.search-input{flex:1;padding:10px 16px;border-radius:24px;border:none;background:rgba(255,255,255,.97);font-size:13px;font-weight:600;color:#1a1a1a;box-shadow:0 4px 16px rgba(0,0,0,.25);outline:none;transition:box-shadow .2s}
.search-input:focus{box-shadow:0 4px 20px rgba(160,56,0,.4)}
.search-input::placeholder{color:#999;font-weight:500}

#map{position:fixed;top:0;left:0;right:0;bottom:0}
#loader{position:fixed;inset:0;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;transition:opacity .6s ease}
#loader.done{opacity:0;pointer-events:none}
#loader img{width:72px;height:72px;border-radius:50%;box-shadow:0 0 30px rgba(160,56,0,.5);animation:logopulse 1.5s ease-in-out infinite}
@keyframes logopulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(160,56,0,.5)}50%{transform:scale(1.06);box-shadow:0 0 45px rgba(160,56,0,.8)}}
#loader h2{font-size:18px;font-weight:900;color:#fff}
#loader p{font-size:12px;color:rgba(255,255,255,.4)}
.bw{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#6b2200,#f39c12);animation:bf 1.5s ease forwards}
@keyframes bf{0%{width:0}100%{width:95%}}

.mapboxgl-ctrl-bottom-right{bottom:100px!important;right:12px!important}
.mapboxgl-ctrl-attrib{font-size:9px!important}

/* Barangay pill — bounce-in animation */
.brgy-marker{cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.brgy-marker:hover .brgy-pill{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,.6)}
.brgy-marker.selected .brgy-pill{transform:scale(1.18);box-shadow:0 0 0 3px #fff, 0 4px 20px rgba(255,255,255,.4)}
.brgy-pill{
  padding:5px 11px;border-radius:20px;
  font-size:10.5px;font-weight:800;color:#fff;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.55);
  white-space:nowrap;text-align:center;
  letter-spacing:0.2px;line-height:1.2;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
}
.brgy-marker.u .brgy-pill{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.brgy-marker.r .brgy-pill{background:linear-gradient(135deg,#27ae60,#1e8449)}
.brgy-marker.t .brgy-pill{background:linear-gradient(135deg,#f39c12,#d68910)}
.brgy-marker.dimmed{opacity:0.2;pointer-events:none}

/* Landmark marker */
.spot-marker{cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:2px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.spot-marker:hover{transform:scale(1.2)}
.spot-marker:hover .spot-icon{box-shadow:0 0 0 3px rgba(255,255,255,.7),0 4px 16px rgba(0,0,0,.5)}
.spot-marker.selected{transform:scale(1.25)}
.spot-icon{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#6b2200,#c0392b);
  border:2.5px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  box-shadow:0 3px 10px rgba(0,0,0,.55);
  transition:box-shadow .2s ease;
  position:relative;
}
/* Pulse ring on landmark icons */
.spot-icon::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:2px solid rgba(192,57,43,0.5);
  animation:pulse 2s ease-out infinite;
}
@keyframes pulse{0%{transform:scale(1);opacity:0.8}70%{transform:scale(1.5);opacity:0}100%{transform:scale(1.5);opacity:0}}
.spot-pill{
  padding:2px 7px;border-radius:10px;
  font-size:8.5px;font-weight:800;color:#fff;
  background:rgba(107,34,0,0.9);
  white-space:nowrap;max-width:96px;
  overflow:hidden;text-overflow:ellipsis;
  text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.4);
  transition:transform .2s ease;
}
.spot-marker:hover .spot-pill{transform:scale(1.05)}

/* Filter chips */
.filters{position:fixed;z-index:95;display:flex;gap:6px;overflow-x:auto;padding:0 12px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);background:rgba(20,20,20,.85);backdrop-filter:blur(8px);color:#ccc;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s ease;flex-shrink:0}
.chip:hover{background:rgba(255,255,255,.15)}
.chip.active{color:#fff;border-color:transparent}
.chip.active.all{background:linear-gradient(135deg,#6b2200,#a03800)}
.chip.active.urban{background:linear-gradient(135deg,#e74c3c,#c0392b);border-color:transparent}
.chip.active.rural{background:linear-gradient(135deg,#27ae60,#1e8449);border-color:transparent}
.chip.active.tourist{background:linear-gradient(135deg,#f39c12,#d68910);border-color:transparent}
.chip.active.landmark{background:linear-gradient(135deg,#6b2200,#c0392b);border-color:transparent}

/* FABs */
.fabs{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:90}
.fab{padding:11px 18px;border-radius:24px;border:none;cursor:pointer;font-size:12px;font-weight:800;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.5);white-space:nowrap;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;display:flex;align-items:center;gap:6px}
.fab:active{transform:scale(0.93)}
.fab:hover{transform:scale(1.05)}
.f3d{background:rgba(20,20,20,.92);backdrop-filter:blur(8px);border:1px solid #444}
.fhome{background:linear-gradient(135deg,#6b2200,#a03800)}

/* Info Panel */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:299;display:none;backdrop-filter:blur(8px);animation:fadeIn .25s ease}
.ov.on{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pan{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;background:#1c1c1e;
  border-radius:24px 24px 0 0;padding:20px 20px 44px;
  z-index:300;display:none;border-top:3px solid #a03800;
  box-shadow:0 -8px 40px rgba(0,0,0,.8);max-height:75vh;overflow-y:auto;
}
.pan.on{display:block;animation:slideUp .35s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100%);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.ph{width:38px;height:4px;background:#3a3a3c;border-radius:2px;margin:0 auto 16px}
.pc{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:#2c2c2e;border:none;color:#aaa;font-size:20px;cursor:pointer;line-height:30px;text-align:center;transition:background .2s}
.pc:hover{background:#3a3a3c}
#pname{font-size:21px;font-weight:900;color:#fff;margin-bottom:5px}
#ptype{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
#pdesc{font-size:13px;color:#999;line-height:1.65;margin-bottom:10px}
.pr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fp{background:#1a3050;color:#74b9ff;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.sp{background:#3d1500;color:#fdcb6e;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.gm{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:14px;background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;border-radius:12px;font-size:13px;font-weight:700;text-decoration:none;transition:transform .2s,box-shadow .2s}
.gm:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(3,105,161,.4)}
</style>
</head>
<body>

<div id="loader">
  <img src="assets/images/bago-city-logo.png" alt="">
  <h2>Bago City 3D Map</h2>
  <p>Loading...</p>
  <div class="bw"><div class="bf"></div></div>
</div>

<div id="map"></div>

<div class="hdr">
  <a href="javascript:history.back()" class="bk">&#8592;</a>
  <div class="hi"><h1>Bago City Interactive Map</h1><p>Tap any marker for details</p></div>
  <img src="assets/images/bago-city-logo.png" alt="">
</div>

<div class="search-bar">
  <input class="search-input" id="search" type="search" placeholder="🔍  Search barangay or landmark..." oninput="onSearch(this.value)" autocomplete="off"/>
</div>

<div class="filters" id="filters" style="top:120px">
  <button class="chip active all" onclick="filterMap('all',this)">All</button>
  <button class="chip urban" onclick="filterMap('urban',this)">🏙️ Urban</button>
  <button class="chip rural" onclick="filterMap('rural',this)">🌿 Rural</button>
  <button class="chip tourist" onclick="filterMap('tourist',this)">⭐ Tourist Spot</button>
  <button class="chip landmark" onclick="filterMap('landmark',this)">📍 Landmark</button>
</div>

<div class="fabs">
  <button class="fab f3d" id="btn3d" onclick="toggle3D()">⬛ Enable 3D</button>
  <button class="fab fhome" onclick="resetView()">🎯 Bago City</button>
</div>

<div class="ov" id="ov" onclick="hide()"></div>
<div class="pan" id="pan">
  <button class="pc" onclick="hide()">&#215;</button>
  <div class="ph"></div>
  <div id="pname"></div>
  <span id="ptype"></span>
  <p id="pdesc"></p>
  <div class="pr" id="pfacts"></div>
  <div class="pr" id="pspots"></div>
  <a class="gm" id="pgm" href="#" target="_blank" rel="noopener">📍 View on Google Maps</a>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiaWN0YmFnbyIsImEiOiJjbXB5czIxNzYwNGozMnJwdWRxbzltaml0In0.bB042ep_ICri40J2x2pPow';

const CENTER = [122.838, 10.510];

  // SOUTH ROW

  {num:'13',name:'Ilijan',             type:'t',lng:123.0549,lat:10.4545,dist:'36.99 km',area:'1,489 ha',pop:'5,581', fiesta:'December 11',                     desc:'Farthest barangay (36.99 km). Coastal. President Quezon stayed here in 1942.',spots:'⭐ WWII Historical Site (Pres. Quezon 1942)'},

// Tourist landmarks
const SPOTS = [
  {name:'Bago City Hall',        icon:'🏛️',lng:122.8351,lat:10.5383,desc:'Seat of the local government of Bago City. Home to the City Mayor and all city departments.',spots:'⭐ Official government center of Bago City'},

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: CENTER,
  zoom: 11.5,
  minZoom: 10.5,
  maxZoom: 17,
  maxBounds: BOUNDS,
});

map.setPadding({top:66, bottom:100});
map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}), 'bottom-right');

map.on('load', () => {
  // Hide loader
  const l = document.getElementById('loader');
  l.classList.add('done');
  setTimeout(()=>l.style.display='none', 500);

  // 3D terrain — Mt. Kanlaon will visibly rise
  map.addSource('dem', {type:'raster-dem', url:'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize:512});
  map.setTerrain({source:'dem', exaggeration:1.8});
  map.setFog({
    color:'rgb(186,210,235)',
    'high-color':'rgb(36,92,223)',
    'horizon-blend':0.02,
    'space-color':'rgb(11,11,25)',
    'star-intensity':0.4
  });

  // Bago City boundary — REMOVED (cleaner without it)

  // Barangay markers — staggered bounce-in animation
  const allBrgyMarkers = [];
  BARANGAYS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = `brgy-marker ${b.type}`;
    el.innerHTML = `<div class="brgy-pill">${b.name}</div>`;
    el.style.animationDelay = `${i * 40}ms`;
    el.onclick = () => selectMarker(el, b.lng, b.lat, () => showInfo(b));
    const marker = new mapboxgl.Marker({element:el, anchor:'center'})
      .setLngLat([b.lng, b.lat])
      .addTo(map);
    allBrgyMarkers.push({marker, el, b, type:'brgy'});
  });

  // Hide/show labels based on zoom
  function updateMarkerVisibility() {
    const zoom = map.getZoom();
    allBrgyMarkers.forEach(({el}) => {
      el.style.opacity = zoom < 10.8 ? '0' : zoom < 11.4 ? '0.55' : '1';
      el.style.pointerEvents = zoom < 10.8 ? 'none' : 'auto';
    });
  }
  map.on('zoom', updateMarkerVisibility);
  updateMarkerVisibility();

  // Smooth intro tilt after map loads
  setTimeout(() => {
    map.easeTo({ pitch: 18, duration: 1800, easing: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t });
    setTimeout(() => map.easeTo({ pitch: 0, duration: 1200 }), 2200);
  }, 800);

  // Tourist spot markers
  const allSpotMarkers = [];
  SPOTS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'spot-marker';
    el.style.animationDelay = `${(BARANGAYS.length + i) * 40}ms`;
    const short = s.name.length > 13 ? s.name.substring(0,12)+'…' : s.name;
    el.innerHTML = `<div class="spot-icon">${s.icon}</div><div class="spot-pill">${short}</div>`;
    const info = {name:s.name, type:'landmark', desc:s.desc, spots:s.spots, dist:'', pop:'', area:'', fiesta:''};
    el.onclick = () => selectMarker(el, s.lng, s.lat, () => showInfo(info));
    new mapboxgl.Marker({element:el, anchor:'top'})
      .setLngLat([s.lng, s.lat])
      .addTo(map);
    allSpotMarkers.push({el, s, type:'landmark'});
  });
});

let activeMarkerEl = null;
function selectMarker(el, lng, lat, callback) {
  // Deselect previous
  if (activeMarkerEl && activeMarkerEl !== el) {
    activeMarkerEl.classList.remove('selected');
  }
  activeMarkerEl = el;
  el.classList.add('selected');
  // Smooth fly to marker
  map.easeTo({
    center: [lng, lat],
    zoom: Math.max(map.getZoom(), 13),
    duration: 600,
    easing: t => 1 - Math.pow(1 - t, 3)
  });
  setTimeout(callback, 300);
}

let currentFilter = 'all';

function filterMap(type, chipEl) {
  currentFilter = type;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active','all','urban','rural','tourist','landmark');
  });
  chipEl.classList.add('active', type);

  allBrgyMarkers.forEach(({el, b}) => {
    let show = true;
    if (type === 'urban')   show = b.type === 'u';
    if (type === 'rural')   show = b.type === 'r';
    if (type === 'tourist') show = b.type === 't';
    if (type === 'landmark') show = false;
    el.classList.toggle('dimmed', !show);
  });
  allSpotMarkers.forEach(({el}) => {
    const show = type === 'all' || type === 'landmark';
    el.style.opacity = show ? '1' : '0.1';
    el.style.pointerEvents = show ? 'auto' : 'none';
  });
}

function onSearch(val) {
  const q = val.trim().toLowerCase();
  if (!q) {
    allBrgyMarkers.forEach(({el}) => el.classList.remove('dimmed'));
    allSpotMarkers.forEach(({el}) => { el.style.opacity='1'; el.style.pointerEvents='auto'; });
    return;
  }
  let found = null;
  allBrgyMarkers.forEach(({el, b}) => {
    const match = b.name.toLowerCase().includes(q);
    el.classList.toggle('dimmed', !match);
    if (match && !found) found = {lng: b.lng, lat: b.lat};
  });
  allSpotMarkers.forEach(({el, s}) => {
    const match = s.name.toLowerCase().includes(q);
    el.style.opacity = match ? '1' : '0.1';
    el.style.pointerEvents = match ? 'auto' : 'none';
    if (match && !found) found = {lng: s.lng, lat: s.lat};
  });
  if (found) {
    map.easeTo({center:[found.lng, found.lat], zoom: 13.5, duration: 700});
  }
}

function toggle3D() {
  is3D = !is3D;
  const btn = document.getElementById('btn3d');
  if (is3D) {
    map.easeTo({pitch:55, bearing:-15, duration:1000});
    btn.innerHTML = '⬜ Disable 3D';
    btn.style.background = 'linear-gradient(135deg,#1a3050,#0369a1)';
    btn.style.border = 'none';
  } else {
    map.easeTo({pitch:0, bearing:0, duration:800});
    btn.innerHTML = '⬛ Enable 3D';
    btn.style.background = 'rgba(20,20,20,.92)';
    btn.style.border = '1px solid #444';
  }
}

function resetView() {
  map.flyTo({center:CENTER, zoom:11.5, pitch:is3D?55:0, bearing:is3D?-15:0, duration:1200});
}

function showInfo(p) {
  document.getElementById('pname').textContent = p.name;
  const t = document.getElementById('ptype');
  const u = p.type==='u', lm = p.type==='landmark';
  t.textContent = u ? '🏙️ Urban Barangay' : lm ? '📍 Landmark / Tourist Spot' : p.type==='t' ? '🌿 Rural · Tourist Spot' : '🌿 Rural Barangay';
  t.style.background = u ? 'rgba(231,76,60,.2)' : lm ? 'rgba(230,126,34,.2)' : p.type==='t' ? 'rgba(243,156,18,.2)' : 'rgba(39,174,96,.2)';
  t.style.color = u ? '#ff7675' : lm ? '#fdcb6e' : p.type==='t' ? '#fdcb6e' : '#55efc4';
  document.getElementById('pdesc').textContent = p.desc || '';
  const f = [];
  if (p.num) f.push('🔢 Barangay No. ' + p.num);
  if (p.dist && p.dist!=='—') f.push('📍 '+p.dist+' from city');
  if (p.pop  && p.pop !=='—') f.push('👥 Pop. '+p.pop);
  if (p.area && p.area!=='—') f.push('📐 '+p.area);
  if (p.fiesta && p.fiesta!=='—') f.push('🎉 '+p.fiesta);
  document.getElementById('pfacts').innerHTML = f.map(x=>`<span class="fp">${x}</span>`).join('');
  document.getElementById('pspots').innerHTML = p.spots ? p.spots.split('|').map(s=>`<span class="sp">${s}</span>`).join('') : '';
  document.getElementById('pgm').href = 'https://maps.google.com/?q='+encodeURIComponent(p.name+' Bago City Negros Occidental Philippines');
  document.getElementById('pan').classList.add('on');
  document.getElementById('ov').classList.add('on');
}

function hide() {
  document.getElementById('pan').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}
</script>
