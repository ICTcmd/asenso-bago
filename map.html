<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>Bago City Map</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a0a00;min-height:100vh}.header{background:linear-gradient(135deg,#6b2200,#a03800);padding:max(16px,env(safe-area-inset-top)) 16px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}.header-info{flex:1}.header-info h1{font-size:16px;font-weight:800;color:#fff}.header-info p{font-size:11px;color:rgba(255,255,255,.65)}.header img{width:36px;height:36px;border-radius:50%}.legend{display:flex;gap:10px;flex-wrap:wrap;padding:10px 16px;background:#fff;border-bottom:1px solid #f0f0f0;font-size:11px;font-weight:600}.leg{display:flex;align-items:center;gap:5px;color:#444}.leg-dot{width:11px;height:11px;border-radius:50%}.map-wrap{padding:12px;overflow-x:auto}.map-wrap svg{display:block;margin:0 auto;filter:drop-shadow(0 8px 24px rgba(0,0,0,.5))}.sea{fill:#b3d9f2}.city-bg{fill:#e8f5e9}.brgy{stroke:#fff;stroke-width:1.5;cursor:pointer;transition:filter .15s}.brgy:hover{filter:brightness(1.15)}.urban{fill:#c0392b}.rural{fill:#27ae60}.tourist{fill:#e67e22}.brgy-label{font-size:7.5px;font-weight:700;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:middle;text-shadow:0 1px 2px rgba(0,0,0,.5)}.landmark-pin{cursor:pointer}.landmark-pin circle{transition:r .15s}.landmark-pin:hover circle{r:10}.landmark-text{font-size:7px;font-weight:700;fill:#7b2d00;text-anchor:middle;pointer-events:none}.mountain{fill:#8d6e63;stroke:#6d4c41;stroke-width:1}.sea-label{font-size:13px;font-weight:800;fill:#1565c0;opacity:.5;font-style:italic}.river{fill:none;stroke:#64b5f6;stroke-width:2.5;stroke-linecap:round;opacity:.7}.compass{font-size:14px;font-weight:900;fill:#555}.info-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-radius:20px 20px 0 0;padding:20px;box-shadow:0 -8px 32px rgba(0,0,0,.2);display:none;z-index:200}.info-panel.show{display:block}.info-panel h2{font-size:18px;font-weight:900;color:#6b2200;margin-bottom:4px}.info-panel .type-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px}.info-panel p{font-size:12px;color:#666;line-height:1.6;margin-bottom:8px}.spot-pill{display:inline-block;background:#fff3e0;color:#e65100;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;margin:2px 3px 2px 0}.fact-pill{display:inline-block;background:#e3f2fd;color:#0277bd;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;margin:2px 3px 2px 0}.panel-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:#f0f0f0;border:none;font-size:18px;cursor:pointer}.gmaps-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:12px;background:linear-gradient(135deg,#0369a1,#0284c7);color:#fff;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}.overlay.show{display:block}.bottom-gmaps{display:block;margin:12px 16px 24px;padding:14px;background:linear-gradient(135deg,#6b2200,#a03800);color:#fff;text-align:center;border-radius:12px;font-weight:700;font-size:13px;text-decoration:none}</style></head><body>

<!-- Info panel overlay -->

<div class="info-panel" id="info-panel">

  <p id="panel-desc"></p>

  <div id="panel-spots"></div>
  <a class="gmaps-btn" id="panel-gmaps" href="#" target="_blank" rel="noopener">📍 View on Google Maps</a>
</div>

<script>
function showInfo(name, type, desc, facts, spots) {
  document.getElementById('panel-name').textContent = name;
  var tb = document.getElementById('panel-type');
  tb.textContent = type === 'Urban' ? '🏙️ Urban Barangay' : type === 'Rural' ? '🌿 Rural Barangay' : '⭐ ' + type;
  tb.style.background = type === 'Urban' ? 'rgba(192,57,43,0.12)' : type === 'Rural' ? 'rgba(5,150,105,0.12)' : 'rgba(230,126,34,0.12)';
  tb.style.color = type === 'Urban' ? '#c0392b' : type === 'Rural' ? '#059669' : '#d97706';
  document.getElementById('panel-desc').textContent = desc;
  var pf = document.getElementById('panel-facts');
  pf.innerHTML = facts ? facts.split('|').map(f=>'<span class="fact-pill">'+f+'</span>').join('') : '';
  var ps = document.getElementById('panel-spots');
  ps.innerHTML = spots ? spots.split('|').map(s=>'<span class="spot-pill">'+s+'</span>').join('') : '';
  document.getElementById('panel-gmaps').href = 'https://maps.google.com/?q=' + encodeURIComponent(name + ' Bago City Negros Occidental Philippines');
  document.getElementById('info-panel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}
function hideInfo() {
  document.getElementById('info-panel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
</script>
