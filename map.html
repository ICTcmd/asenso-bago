<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bago City Interactive Map</title>
<link rel="preconnect" href="https://api.mapbox.com">
<link rel="preconnect" href="https://events.mapbox.com">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* Header */
.hdr {
  background: linear-gradient(135deg, #6b2200, #a03800);
  padding: max(14px, env(safe-area-inset-top)) 16px 14px;
  display: flex; align-items: center; gap: 12px;
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.bk { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
.hi { flex: 1; }
.hi h1 { font-size: 16px; font-weight: 800; color: #fff; }
.hi p  { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 1px; }
.hdr img { width: 36px; height: 36px; border-radius: 50%; }

/* Map fills everything below header */
#map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

/* Loading overlay */
#loader {
  position: fixed; inset: 0; background: #0a1628;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; gap: 14px; transition: opacity .5s ease;
}
#loader.done { opacity: 0; pointer-events: none; }
#loader img { width: 72px; height: 72px; border-radius: 50%; box-shadow: 0 0 30px rgba(160,56,0,.5); }
#loader h2 { font-size: 18px; font-weight: 900; color: #fff; }
#loader p  { font-size: 12px; color: rgba(255,255,255,.4); }
.bar-wrap { width: 180px; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg,#6b2200,#f39c12); animation: bfill 2.5s ease forwards; }
@keyframes bfill { 0%{width:0} 50%{width:70%} 90%{width:90%} 100%{width:95%} }

/* Map controls */
.mapboxgl-ctrl-bottom-right { bottom: 120px !important; right: 12px !important; }
.mapboxgl-ctrl-attrib { font-size: 9px !important; }

/* Floating buttons */
.fab-row {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 90;
}
.fab {
  padding: 11px 18px; border-radius: 24px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 800; color: #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,.5);
  white-space: nowrap; transition: transform .15s, filter .15s;
  display: flex; align-items: center; gap: 6px;
}
.fab:active { transform: scale(0.96); }
.fab-primary { background: linear-gradient(135deg,#6b2200,#a03800); }
.fab-secondary { background: rgba(20,20,20,.92); backdrop-filter: blur(8px); border: 1px solid #333; }

/* Pitch toggle */
.pitch-badge {
  position: fixed; top: 0; right: 12px; z-index: 90;
  background: rgba(20,20,20,.85); backdrop-filter: blur(6px);
  border-radius: 0 0 10px 10px; padding: 5px 12px;
  font-size: 10px; font-weight: 700; color: #aaa;
  border: 1px solid #333; border-top: none; cursor: pointer;
}

/* Legend */
.legend {
  position: fixed; left: 12px; z-index: 90;
  background: rgba(15,15,20,.9); backdrop-filter: blur(8px);
  border-radius: 12px; padding: 10px 13px;
  border: 1px solid rgba(255,255,255,.08);
  font-size: 11px;
}
.leg { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: #ccc; font-weight: 600; }
.leg:last-child { margin: 0; }
.ld { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

/* Info panel */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 299; display: none; backdrop-filter: blur(8px); }
.ov.on { display: block; }
.panel {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 520px;
  background: #1c1c1e; border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px; z-index: 300; display: none;
  border-top: 3px solid #a03800;
  box-shadow: 0 -8px 40px rgba(0,0,0,.8);
  max-height: 75vh; overflow-y: auto;
}
.panel.on { display: block; animation: sup .3s cubic-bezier(.2,.8,.3,1); }
@keyframes sup { from{transform:translateX(-50%) translateY(100%)} to{transform:translateX(-50%) translateY(0)} }
.ph { width: 38px; height: 4px; background: #3a3a3c; border-radius: 2px; margin: 0 auto 16px; }
.pc { position: absolute; top: 18px; right: 18px; width: 30px; height: 30px; border-radius: 50%; background: #2c2c2e; border: none; color: #aaa; font-size: 20px; cursor: pointer; line-height: 30px; text-align: center; }
#pname { font-size: 21px; font-weight: 900; color: #fff; margin-bottom: 5px; }
#ptype { display: inline-block; font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
#pdesc { font-size: 13px; color: #999; line-height: 1.65; margin-bottom: 10px; }
.pr { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.fp { background: #1a3050; color: #74b9ff; font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }
.sp { background: #3d1500; color: #fdcb6e; font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }
.gm { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; padding: 14px; background: linear-gradient(135deg,#0369a1,#0ea5e9); color: #fff; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; }
</style>
</head>

<div id="loader">

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiaWN0YmFnbyIsImEiOiJjbXB5czIxNzYwNGozMnJwdWRxbzltaml0In0.bB042ep_ICri40J2x2pPow';

// Nav controls
map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'bottom-right');

// Barangay data
const barangays = [
  { name:'Abuanan',             type:'u', dist:'25 km',    area:'1,040 ha', pop:'5,700',  fiesta:'Hublag Festival (Last Sat Feb)', desc:'An urban barangay in the northeast known for quarries and rice mills.', spots:'', center:[122.960,10.548] },
  { name:'Alianza',             type:'r', dist:'15 km',    area:'365 ha',   pop:'3,211',  fiesta:'February 2',                    desc:'A rural barangay known for agricultural lands and rice production.', spots:'', center:[122.800,10.480] },
  { name:'Atipuluan',           type:'u', dist:'17.46 km', area:'562 ha',   pop:'4,269',  fiesta:'Pasiduong Festival (May 15)',   desc:'An urban barangay along the main highway — key commercial and residential hub.', spots:'', center:[122.898,10.510] },
  { name:'Bacong-Montilla',     type:'r', dist:'29.50 km', area:'4,827 ha', pop:'7,844',  fiesta:'Lumbayag Festival (Mar 26)',    desc:'Largest barangay by land area — vast agricultural and forest lands bordering Murcia.', spots:'', center:[122.985,10.568] },

  { name:'Dulao',               type:'r', dist:'17.8 km',  area:'2,439 ha', pop:'10,111', fiesta:'Hataw Dance Festival (Dec 8)', desc:'A rural barangay traversed by the Bago River with fertile agricultural land.', spots:'', center:[122.900,10.585] },

  { name:'Ma-ao',               type:'t', dist:'21.70 km', area:'5,998 ha', pop:'14,916', fiesta:'Mabaw-Malaw Festival (Dec 30)',desc:'Most populated barangay. Home to the historic Ma-ao Sugar Central.', spots:'⭐ Ma-ao Sugar Central (Heritage site)|⭐ MSC Ruins (Lacson Mansion)', center:[122.892,10.462] },
  { name:'Mailum',              type:'t', dist:'29.46 km', area:'3,200 ha', pop:'8,844',  fiesta:'Ginom-Ginom Fest (Mar 19)',   desc:'Prime ecotourism destination at the foot of Mt. Kanlaon. Home to Kipot Twin Falls.', spots:'⭐ Kipot Twin Falls (220 steps)|⭐ Pataan Mountain Resort|⭐ Kipot Summer Resort', center:[122.908,10.395] },

  { name:'Poblacion',           type:'t', dist:'0 km',     area:'311 ha',   pop:'11,794', fiesta:'Fiesta of San Sebastian (Jan)',desc:'Main downtown — seat of local government. Smallest land area (311 ha). City center.', spots:'⭐ Bantayan Park (1898 Revolution)|⭐ Balay ni Tan Juan|⭐ Bago City Cathedral|⭐ Javellana Mansion', center:[122.833,10.497] },
  { name:'Sagasa',              type:'r', dist:'—',        area:'—',        pop:'—',      fiesta:'—',                           desc:'A coastal rural barangay along the Guimaras Strait, known for fishing and mangrove forests.', spots:'', center:[122.700,10.462] },

  { name:'Taloc',               type:'u', dist:'—',        area:'—',        pop:'—',      fiesta:'—',                           desc:'An urban barangay in the northwest bordering Bacolod City.', spots:'', center:[122.798,10.598] },

const clr = { u:'#e74c3c', r:'#27ae60', t:'#f39c12' };

// GeoJSON — approximate barangay polygons (matched to real map layout)
const features = barangays.map(b => ({
  type: 'Feature',
  properties: { ...b, fillColor: clr[b.type] },
  geometry: {
    type: 'Point',   // used for labels/click — actual polygons would need real boundary data
    coordinates: b.center
  }
}));

// Approximate boundary polygons per barangay
// These are rough bounding polygons derived from the real map
const polygons = [
  { name:'Calumangan',      coords:[[122.690,10.575],[122.750,10.622],[122.790,10.610],[122.788,10.568],[122.748,10.555],[122.700,10.555]] },
  { name:'Taloc',           coords:[[122.750,10.622],[122.808,10.622],[122.840,10.610],[122.838,10.572],[122.808,10.562],[122.788,10.568],[122.790,10.610]] },
  { name:'Tabunan',         coords:[[122.808,10.622],[122.888,10.618],[122.910,10.600],[122.900,10.568],[122.858,10.558],[122.838,10.572],[122.840,10.610]] },
  { name:'Dulao',           coords:[[122.888,10.618],[122.958,10.612],[122.990,10.595],[122.982,10.560],[122.940,10.548],[122.900,10.552],[122.900,10.568],[122.910,10.600]] },
  { name:'Abuanan',         coords:[[122.958,10.612],[123.005,10.545],[122.995,10.505],[122.960,10.492],[122.928,10.500],[122.910,10.530],[122.940,10.548],[122.982,10.560]] },
  { name:'Bacong-Montilla', coords:[[123.005,10.545],[123.010,10.580],[122.990,10.595],[122.958,10.612],[122.982,10.560],[122.995,10.505]] },
  { name:'Balingasag',      coords:[[122.700,10.555],[122.748,10.555],[122.768,10.542],[122.758,10.522],[122.730,10.518],[122.705,10.525]] },
  { name:'Napoles',         coords:[[122.748,10.555],[122.788,10.568],[122.808,10.562],[122.808,10.532],[122.790,10.515],[122.768,10.515],[122.758,10.522],[122.768,10.542]] },
  { name:'Busay',           coords:[[122.808,10.562],[122.838,10.572],[122.858,10.558],[122.900,10.552],[122.895,10.518],[122.870,10.505],[122.845,10.505],[122.818,10.512],[122.808,10.532]] },
  { name:'Malingin',        coords:[[122.858,10.558],[122.900,10.552],[122.940,10.548],[122.935,10.510],[122.908,10.498],[122.878,10.498],[122.858,10.512],[122.858,10.535]] },
  { name:'Atipuluan',       coords:[[122.900,10.552],[122.940,10.548],[122.960,10.492],[122.935,10.480],[122.908,10.480],[122.888,10.492],[122.878,10.498],[122.908,10.498],[122.935,10.510]] },
  { name:'Sampinit',        coords:[[122.940,10.548],[122.995,10.505],[122.968,10.458],[122.940,10.448],[122.920,10.458],[122.908,10.480],[122.935,10.480],[122.960,10.492]] },
  { name:'Pacol',           coords:[[122.705,10.525],[122.730,10.518],[122.748,10.515],[122.740,10.495],[122.718,10.488],[122.700,10.495]] },
  { name:'Caridad',         coords:[[122.748,10.515],[122.768,10.515],[122.790,10.515],[122.788,10.492],[122.768,10.480],[122.748,10.482],[122.740,10.495]] },

  { name:'Bagroy',          coords:[[122.690,10.495],[122.700,10.495],[122.718,10.488],[122.712,10.468],[122.695,10.462],[122.682,10.468],[122.680,10.482]] },
  { name:'Sagasa',          coords:[[122.682,10.468],[122.695,10.462],[122.712,10.468],[122.710,10.448],[122.695,10.440],[122.680,10.445],[122.675,10.458]] },
  { name:'Mailum',          coords:[[122.878,10.432],[122.900,10.445],[122.905,10.415],[122.925,10.400],[122.925,10.368],[122.905,10.355],[122.882,10.358],[122.865,10.372],[122.860,10.398],[122.865,10.420]] },

];

const polyGeoJSON = {
  type: 'FeatureCollection',
  features: polygons.map(p => {
    const b = barangays.find(x => x.name === p.name);
    const coords = [...p.coords, p.coords[0]]; // close polygon
    return {
      type: 'Feature',
      id: p.name,
      properties: b ? { ...b, fillColor: clr[b.type] } : { name: p.name, fillColor: '#888' },
      geometry: { type: 'Polygon', coordinates: [coords] }
    };
  })
};

let is3D = false;
let hoveredId = null;

map.on('load', () => {
  // Hide loader
  const loader = document.getElementById('loader');
  loader.classList.add('done');
  setTimeout(() => loader.style.display = 'none', 600);

  // Position legend below header
  document.getElementById('legend').style.top = (HDR_H + 12) + 'px';

  // Enable 3D terrain
  map.addSource('mapbox-dem', {
    type: 'raster-dem',
    url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
    tileSize: 512,
    maxzoom: 14
  });
  map.setTerrain({ source: 'mapbox-dem', exaggeration: 2.0 });

  // Sky for 3D feel
  map.setFog({
    color: 'rgb(186,210,235)',
    'high-color': 'rgb(36,92,223)',
    'horizon-blend': 0.02,
    'space-color': 'rgb(11,11,25)',
    'star-intensity': 0.4
  });

  // Add barangay polygon source
  map.addSource('barangays', { type: 'geojson', data: polyGeoJSON });

  // Fill layer
  map.addLayer({
    id: 'brgy-fill',
    type: 'fill',
    source: 'barangays',
    paint: {
      'fill-color': ['get', 'fillColor'],
      'fill-opacity': ['interpolate', ['linear'], ['zoom'],
        10.5, 0.25,
        14, 0.45
      ]
    }
  }, 'road-label');

  // Hover highlight
  map.addLayer({
    id: 'brgy-hover',
    type: 'fill',
    source: 'barangays',
    paint: {
      'fill-color': ['get', 'fillColor'],
      'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.75, 0]
    }
  }, 'road-label');

  // Outline
  map.addLayer({
    id: 'brgy-outline',
    type: 'line',
    source: 'barangays',
    paint: {
      'line-color': ['get', 'fillColor'],
      'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 14, 2.5],
      'line-opacity': 0.9
    }
  }, 'road-label');

  // Labels
  map.addLayer({
    id: 'brgy-labels',
    type: 'symbol',
    source: 'barangays',
    layout: {
      'text-field': ['get', 'name'],
      'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
      'text-size': ['interpolate', ['linear'], ['zoom'], 11, 9, 14, 13],
      'text-anchor': 'center',
      'text-max-width': 8
    },
    paint: {
      'text-color': '#fff',
      'text-halo-color': 'rgba(0,0,0,0.8)',
      'text-halo-width': 2
    }
  });

  // Hover effect
  map.on('mousemove', 'brgy-fill', e => {
    map.getCanvas().style.cursor = 'pointer';
    if (e.features.length > 0) {
      if (hoveredId) map.setFeatureState({ source:'barangays', id:hoveredId }, { hover:false });
      hoveredId = e.features[0].id;
      map.setFeatureState({ source:'barangays', id:hoveredId }, { hover:true });
    }
  });
  map.on('mouseleave', 'brgy-fill', () => {
    map.getCanvas().style.cursor = '';
    if (hoveredId) map.setFeatureState({ source:'barangays', id:hoveredId }, { hover:false });
    hoveredId = null;
  });

  // Click barangay polygon
  map.on('click', 'brgy-fill', e => {
    const p = e.features[0].properties;
    showInfo(p);
  });

  // Tourist spot markers
  const landmarks = [
    { name:'Bantayan Park',                  icon:'🏛️', lng:122.834, lat:10.498, desc:'Historic park — site of the November 5, 1898 revolution by Gen. Juan Araneta.', spots:'⭐ Al Cinco de Noviembre celebration site' },
    { name:'Bago City Cathedral',            icon:'⛪', lng:122.833, lat:10.497, desc:'Spanish-colonial cathedral dedicated to San Sebastian, patron saint of Bago City.', spots:'⭐ Religious heritage landmark' },
    { name:'Javellana Mansion (Balay Daku)', icon:'🏰', lng:122.830, lat:10.495, desc:'Built in 1920 on a 440-ha sugar plantation, designed by an Italian architect.', spots:'⭐ Heritage ancestral house tour' },
    { name:'Ma-ao Sugar Central',            icon:'🏭', lng:122.895, lat:10.460, desc:'Historic sugar mill — heritage industrial landmark in the most populated barangay.', spots:'⭐ MSC Ruins|⭐ Lacson Mansion ruins' },
    { name:'Kipot Twin Falls',               icon:'💧', lng:122.908, lat:10.400, desc:'Stunning twin waterfalls in Brgy. Mailum. Reached via 220 steps.', spots:'⭐ Nature ecotourism destination' },
    { name:'Buenos Aires Mountain Resort',   icon:'⛰️', lng:122.850, lat:10.540, desc:'Scenic mountain resort in Brgy. Busay with breathtaking views.', spots:'⭐ Mountain resort & hiking' },
    { name:'Hundred Hills Nature Resort',    icon:'🌿', lng:122.836, lat:10.475, desc:'Nature resort with rolling hills and lush greenery south of the city proper.', spots:'⭐ Nature resort' },
  ];

  landmarks.forEach(lm => {
    const el = document.createElement('div');
    el.style.cssText = 'width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6b2200,#c0392b);border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.55);transition:transform .15s';
    el.textContent = lm.icon;
    el.onmouseenter = () => el.style.transform = 'scale(1.25)';
    el.onmouseleave = () => el.style.transform = 'scale(1)';
    el.onclick = () => showInfo({ name:lm.name, type:'landmark', desc:lm.desc, spots:lm.spots, dist:'', pop:'', area:'', fiesta:'' });
    new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lm.lng, lm.lat])
      .addTo(map);
  });
});

function toggle3D() {
  is3D = !is3D;
  const btn = document.getElementById('btn3d');
  if (is3D) {
    map.easeTo({ pitch: 55, bearing: -15, duration: 1000 });
    btn.textContent = '⬜ Disable 3D';
    btn.style.background = 'linear-gradient(135deg,#1a3050,#0369a1)';
  } else {
    map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
    btn.textContent = '⬛ Enable 3D';
    btn.style.background = 'rgba(20,20,20,.92)';
  }
}

function resetView() {
  map.flyTo({ center: CENTER, zoom: 11.8, pitch: is3D ? 55 : 0, bearing: is3D ? -15 : 0, duration: 1200 });
}

function showInfo(p) {
  document.getElementById('pname').textContent = p.name;
  const t = document.getElementById('ptype');
  const u = p.type==='u', r = p.type==='r' || p.type==='t';
  t.textContent = p.type==='u' ? '🏙️ Urban Barangay' : p.type==='landmark' ? '📍 Landmark / Tourist Spot' : '🌿 Rural Barangay';
  t.style.background = u ? 'rgba(231,76,60,.2)' : p.type==='landmark' ? 'rgba(230,126,34,.2)' : 'rgba(39,174,96,.2)';
  t.style.color = u ? '#ff7675' : p.type==='landmark' ? '#fdcb6e' : '#55efc4';
  document.getElementById('pdesc').textContent = p.desc || '';
  let facts = [];
  if (p.dist && p.dist !== '—' && p.dist !== '') facts.push('📍 ' + p.dist + ' from city');
  if (p.pop  && p.pop  !== '—' && p.pop  !== '') facts.push('👥 Pop. ' + p.pop);
  if (p.area && p.area !== '—' && p.area !== '') facts.push('📐 ' + p.area);
  if (p.fiesta && p.fiesta !== '—' && p.fiesta !== '') facts.push('🎉 ' + p.fiesta);
  document.getElementById('pfacts').innerHTML = facts.map(f => `<span class="fp">${f}</span>`).join('');
  document.getElementById('pspots').innerHTML = p.spots ? p.spots.split('|').map(s => `<span class="sp">${s}</span>`).join('') : '';
  document.getElementById('pgm').href = 'https://maps.google.com/?q=' + encodeURIComponent(p.name + ' Bago City Negros Occidental Philippines');
  document.getElementById('panel').classList.add('on');
  document.getElementById('ov').classList.add('on');
}

function hide() {
  document.getElementById('panel').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}
</script>
</body>
</html>
