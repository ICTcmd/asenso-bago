<style>
*{margin:0;padding:0;box-sizing:border-box}

.bk{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}

.ch.on.ca{background:linear-gradient(135deg,#6b2200,#a03800)}
.ch.on.cu{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.ch.on.cr{background:linear-gradient(135deg,#27ae60,#1e8449)}
.ch.on.ct{background:linear-gradient(135deg,#f39c12,#d68910)}
.ch.on.cl{background:linear-gradient(135deg,#5c1a00,#c0392b)}
#map{position:fixed;top:0;left:0;right:0;bottom:0}
#ldr{position:fixed;inset:0;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;transition:opacity .6s}
#ldr.done{opacity:0;pointer-events:none}
#ldr img{width:72px;height:72px;border-radius:50%;animation:lp 1.4s ease-in-out infinite;box-shadow:0 0 30px rgba(160,56,0,.5)}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#ldr h2{font-size:18px;font-weight:900;color:#fff}
#ldr p{font-size:12px;color:rgba(255,255,255,.4)}
.bw{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#6b2200,#f39c12);animation:bfill 1.5s ease forwards}
@keyframes bfill{0%{width:0}100%{width:95%}}
.mapboxgl-ctrl-bottom-right{bottom:90px!important;right:12px!important}
.mapboxgl-ctrl-attrib{font-size:9px!important}
.bp{cursor:pointer;animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both;transition:opacity .3s}
.bp:hover .bpill{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,.65)}
.bp.sel .bpill{transform:scale(1.2);box-shadow:0 0 0 3px #fff,0 4px 20px rgba(255,255,255,.4)}
.bp.dim{opacity:.1!important;pointer-events:none!important}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.bpill{padding:5px 11px;border-radius:20px;font-size:10.5px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.55);white-space:nowrap;letter-spacing:.2px;line-height:1.2;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.bp.u .bpill{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.bp.r .bpill{background:linear-gradient(135deg,#27ae60,#1e8449)}
.bp.t .bpill{background:linear-gradient(135deg,#f39c12,#d68910)}
.lm{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.lm:hover{transform:scale(1.2)}
.lm:hover .lmi{box-shadow:0 0 0 3px rgba(255,255,255,.7),0 4px 16px rgba(0,0,0,.5)}

@keyframes ring{0%{transform:scale(1);opacity:.8}70%,100%{transform:scale(1.6);opacity:0}}
.lmt{padding:2px 7px;border-radius:10px;font-size:8.5px;font-weight:800;color:#fff;background:rgba(107,34,0,.9);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 4px rgba(0,0,0,.4)}

.f3d{background:rgba(20,20,20,.92);backdrop-filter:blur(8px);border:1px solid #444}
.fhome{background:linear-gradient(135deg,#6b2200,#a03800)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:299;display:none;backdrop-filter:blur(8px);animation:fi .25s ease}
.ov.on{display:block}
@keyframes fi{from{opacity:0}to{opacity:1}}
.pan{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#1c1c1e;border-radius:24px 24px 0 0;padding:20px 20px 44px;z-index:300;display:none;border-top:3px solid #a03800;box-shadow:0 -8px 40px rgba(0,0,0,.8);max-height:78vh;overflow-y:auto}

@keyframes su{from{transform:translateX(-50%) translateY(100%);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

.pc{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:#2c2c2e;border:none;color:#aaa;font-size:20px;cursor:pointer;line-height:30px;text-align:center;transition:background .2s}
.pc:hover{background:#3a3a3c}
#pname{font-size:21px;font-weight:900;color:#fff;margin-bottom:5px}

.pr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fp{background:#1a3050;color:#74b9ff;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.sp{background:#3d1500;color:#fdcb6e;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.gm{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:14px;background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;border-radius:12px;font-size:13px;font-weight:700;text-decoration:none;transition:transform .2s}
.gm:hover{transform:scale(1.02)}
</style>
</head>

mapboxgl.accessToken="pk.eyJ1IjoiaWN0YmFnbyIsImEiOiJjbXB5czIxNzYwNGozMnJwdWRxbzltaml0In0.bB042ep_ICri40J2x2pPow";
const BARANGAYS=[{"num":"01","name":"Abuanan","type":"u","lng":122.9928,"lat":10.5269,"dist":"25 km","area":"1,040 ha","pop":"5,700","fiesta":"Hublag Festival (Last Sat Feb)","desc":"An urban barangay in the northeast known for quarries and rice mills.","spots":""},{"num":"02","name":"Alianza","type":"r","lng":122.9305,"lat":10.4761,"dist":"15 km","area":"365 ha","pop":"3,211","fiesta":"February 2","desc":"A rural barangay known for agricultural lands and rice production.","spots":""},{"num":"03","name":"Atipuluan","type":"u","lng":122.9562,"lat":10.5127,"dist":"17.46 km","area":"562 ha","pop":"4,269","fiesta":"Pasiduong Festival (May 15)","desc":"An urban barangay along the main Negros South Road — key commercial hub.","spots":""},{"num":"04","name":"Bacong-Montilla","type":"r","lng":123.0345,"lat":10.5213,"dist":"29.50 km","area":"4,827 ha","pop":"7,844","fiesta":"Lumbayag Festival (Mar 26)","desc":"Largest barangay by land area. Vast agricultural and forest lands bordering Murcia.","spots":""},{"num":"05","name":"Bagroy","type":"r","lng":122.8716,"lat":10.479,"dist":"11 km","area":"399 ha","pop":"1,694","fiesta":"February 11","desc":"Smallest population (1,694). Coastal barangay along the Guimaras Strait.","spots":""},{"num":"06","name":"Balingasag","type":"u","lng":122.8423,"lat":10.5343,"dist":"1.25 km","area":"436 ha","pop":"4,498","fiesta":"Zumbali Festival (May 31)","desc":"An urban barangay with commercial establishments near the city center.","spots":""},{"num":"07","name":"Binubuhan","type":"r","lng":123.0067,"lat":10.4592,"dist":"29.50 km","area":"2,352 ha","pop":"5,581","fiesta":"Lechon Festival (Apr 17)","desc":"A rural barangay in Cluster 8 with Ma-ao and Mailum.","spots":""},{"num":"08","name":"Busay","type":"t","lng":122.8885,"lat":10.5389,"dist":"7.26 km","area":"1,463 ha","pop":"6,896","fiesta":"Sinadya Festival (Mar 3)","desc":"A rural barangay with scenic mountain views toward Mt. Kanlaon.","spots":"⭐ Buenos Aires Mountain Resort"},{"num":"09","name":"Calumangan","type":"r","lng":122.8767,"lat":10.5579,"dist":"6.40 km","area":"1,007 ha","pop":"7,979","fiesta":"Kalumangan Festival (May 15)","desc":"A rural barangay known for rice mills and the Bago River watershed.","spots":""},{"num":"10","name":"Caridad","type":"u","lng":122.9062,"lat":10.4843,"dist":"12 km","area":"—","pop":"4,901","fiesta":"Dinagaw Festival (2nd Sat Mar)","desc":"An urban barangay forming part of the Bago City urban core.","spots":""},{"num":"11","name":"Don Jorge L. Araneta","type":"u","lng":122.947,"lat":10.4793,"dist":"16.90 km","area":"2,143 ha","pop":"9,457","fiesta":"Manupak-tapas Festival (Dec 8)","desc":"Named after Gen. Juan A. Araneta who led the 1898 revolution.","spots":"⭐ Araneta Heritage Site"},{"num":"12","name":"Dulao","type":"r","lng":122.9514,"lat":10.5504,"dist":"17.8 km","area":"2,439 ha","pop":"10,111","fiesta":"Hataw Dance Festival (Dec 8)","desc":"A rural barangay traversed by the Bago River with fertile agricultural land.","spots":""},{"num":"13","name":"Ilijan","type":"t","lng":123.0555,"lat":10.4537,"dist":"36.99 km","area":"1,489 ha","pop":"5,581","fiesta":"December 11","desc":"Farthest barangay (36.99 km). President Quezon stayed here in 1942.","spots":"⭐ WWII Historical Site"},{"num":"14","name":"Lag-Asan","type":"r","lng":122.8378,"lat":10.5318,"dist":"1.60 km","area":"456 ha","pop":"11,794","fiesta":"Simadya Festival (Mar 3)","desc":"A rural barangay south of Poblacion with the Hundred Hills Nature Resort.","spots":"⭐ Hundred Hills Nature Resort"},{"num":"15","name":"Ma-ao","type":"t","lng":122.9915,"lat":10.4914,"dist":"21.70 km","area":"5,998 ha","pop":"14,916","fiesta":"Mabaw-Malaw Festival (Dec 30)","desc":"Most populated barangay (14,916). Home to the historic Ma-ao Sugar Central.","spots":"⭐ Ma-ao Sugar Central|⭐ MSC Ruins"},{"num":"16","name":"Mailum","type":"t","lng":123.0494,"lat":10.4636,"dist":"29.46 km","area":"3,200 ha","pop":"8,844","fiesta":"Ginom-Ginom Festival (Mar 19)","desc":"Prime ecotourism destination at the foot of Mt. Kanlaon.","spots":"⭐ Kipot Twin Falls (220 steps)|⭐ Pataan Mountain Resort"},{"num":"17","name":"Malingin","type":"r","lng":122.9182,"lat":10.4951,"dist":"12.20 km","area":"1,495 ha","pop":"6,649","fiesta":"Palakad Festival (Mar 19)","desc":"A rural barangay known for rice mills and farming communities.","spots":""},{"num":"18","name":"Napoles","type":"r","lng":122.8981,"lat":10.5141,"dist":"9.26 km","area":"1,279 ha","pop":"6,564","fiesta":"Kasalipan Festival (Mar 30)","desc":"A rural barangay known for rice mills and rice fields.","spots":""},{"num":"19","name":"Pacol","type":"r","lng":122.8673,"lat":10.4968,"dist":"7.20 km","area":"—","pop":"3,999","fiesta":"December 12","desc":"A rural barangay near the city center along the coastal area.","spots":""},{"num":"20","name":"Poblacion","type":"t","lng":122.8353,"lat":10.5402,"dist":"0 km","area":"311 ha","pop":"11,794","fiesta":"Fiesta of San Sebastian (Jan)","desc":"Main downtown - seat of local government. Smallest land area (311 ha).","spots":"⭐ Bantayan Park|⭐ Balay ni Tan Juan|⭐ Bago City Cathedral|⭐ Javellana Mansion"},{"num":"21","name":"Sagasa","type":"r","lng":122.8929,"lat":10.4717,"dist":"—","area":"—","pop":"—","fiesta":"—","desc":"A coastal rural barangay along the Guimaras Strait known for fishing.","spots":""},{"num":"22","name":"Sampinit","type":"r","lng":122.8534,"lat":10.5459,"dist":"11 km","area":"553 ha","pop":"6,856","fiesta":"Sinadya Festival (Mar 3)","desc":"A rural barangay east of the city center bordering Mt. Kanlaon Natural Park.","spots":""},{"num":"23","name":"Tabunan","type":"r","lng":122.9373,"lat":10.5775,"dist":"—","area":"—","pop":"—","fiesta":"—","desc":"A rural barangay in the north with mangrove forests and rice fields.","spots":""},{"num":"24","name":"Taloc","type":"u","lng":122.9094,"lat":10.5887,"dist":"—","area":"—","pop":"—","fiesta":"—","desc":"An urban barangay in the northwest bordering Bacolod City.","spots":""}];
const SPOTS=[{"name":"Bago City Hall","icon":"🏛️","cat":"Government","lng":122.8351,"lat":10.5383,"desc":"Seat of the local government of Bago City.","spots":"Official government center"},{"name":"Bago City Hospital","icon":"🏥","cat":"Hospital","lng":122.8471,"lat":10.5355,"desc":"Primary government hospital serving Bago City.","spots":"Main public health facility"},{"name":"Bago City Cathedral","icon":"⛪","cat":"Religious","lng":122.8344,"lat":10.5372,"desc":"Spanish-colonial cathedral dedicated to San Sebastian, patron saint of Bago City.","spots":"Religious heritage landmark"},{"name":"Bantayan Park","icon":"🌳","cat":"Heritage","lng":122.8317,"lat":10.5368,"desc":"Historic park - site of the November 5, 1898 revolution by Gen. Juan Araneta.","spots":"Al Cinco de Noviembre celebration"},{"name":"Balay ni Tan Juan","icon":"🏡","cat":"Heritage","lng":122.8348,"lat":10.5345,"desc":"Well-preserved ancestral house showcasing Bago City cultural heritage.","spots":"Heritage museum"},{"name":"Javellana Mansion","icon":"🏰","cat":"Heritage","lng":122.8361,"lat":10.5369,"desc":"Built in 1920 on a 440-ha sugar plantation, designed by an Italian architect.","spots":"Heritage ancestral house"},{"name":"Ma-ao Sugar Central","icon":"🏭","cat":"Heritage","lng":122.9506,"lat":10.477,"desc":"Historic sugar mill - heritage industrial landmark in the most populated barangay.","spots":"Heritage industrial site"},{"name":"Kipot Twin Falls","icon":"💧","cat":"Tourist Spot","lng":123.0706,"lat":10.4788,"desc":"Stunning twin waterfalls in Brgy. Mailum. Reached via 220 steps.","spots":"Nature ecotourism"},{"name":"Pataan Mountain Resort","icon":"🏔","cat":"Tourist Spot","lng":123.0906,"lat":10.4808,"desc":"Mountain getaway near Kanlaon Volcano with scenic views.","spots":"Mountain resort"},{"name":"Buenos Aires Resort","icon":"⛰","cat":"Tourist Spot","lng":123.0474,"lat":10.4552,"desc":"Scenic mountain resort in Brgy. Busay with breathtaking panoramic views.","spots":"Mountain resort and hiking"},{"name":"Rafael Salas Park","icon":"🌿","cat":"Park","lng":123.0555,"lat":10.4486,"desc":"Named after Rafael Salas, UN Under-Secretary General from Bago City.","spots":"Nature park"},{"name":"Bago City Market","icon":"🏪","cat":"Commercial","lng":122.8374,"lat":10.5396,"desc":"Main public market of Bago City.","spots":"Fresh produce and local products"},{"name":"Bago Bus Terminal","icon":"🚌","cat":"Transport","lng":122.992,"lat":10.4876,"desc":"Main bus and jeepney terminal with routes to Bacolod.","spots":"Main transport hub"},{"name":"Bago City Police","icon":"🚔","cat":"Government","lng":122.8414,"lat":10.5264,"desc":"Bago City Police Station - Philippine National Police.","spots":"Emergency: 911"},{"name":"Bago City Library","icon":"📚","cat":"Government","lng":122.8343,"lat":10.535,"desc":"Bago City Public Library providing educational resources.","spots":"Public library"}];
const CENTER=[122.950,10.510];
const BOUNDS=[[122.67,10.28],[123.25,10.70]];
const INITIAL_ZOOM=11.2;
const BM=[],LM=[];
let is3D=false,activeEl=null;

const map=new mapboxgl.Map({container:"map",style:"mapbox://styles/mapbox/streets-v12",center:CENTER,zoom:INITIAL_ZOOM,minZoom:10.5,maxZoom:17,maxBounds:BOUNDS});
map.setPadding({top:160,bottom:90});
map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),"bottom-right");

map.on("load",()=>{
  const l=document.getElementById("ldr");
  l.classList.add("done");
  setTimeout(()=>l.style.display="none",600);

  map.addSource("dem",{type:"raster-dem",url:"mapbox://mapbox.mapbox-terrain-dem-v1",tileSize:512});
  map.setTerrain({source:"dem",exaggeration:1.8});
  map.setFog({color:"rgb(186,210,235)","high-color":"rgb(36,92,223)","horizon-blend":0.02});

  BARANGAYS.forEach((b,i)=>{
    const el=document.createElement("div");
    el.className="bp "+b.type;
    el.innerHTML="<div class=bpill>"+b.name+"</div>";
    el.style.animationDelay=(i*35)+"ms";
    el.onclick=()=>onTap(el,b.lng,b.lat,()=>showPan(b));
    new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat([b.lng,b.lat]).addTo(map);
    BM.push({el,b});
  });

  SPOTS.forEach((s,i)=>{
    const el=document.createElement("div");
    el.className="lm";
    el.style.animationDelay=((BARANGAYS.length+i)*35)+"ms";
    const sh=s.name.length>13?s.name.slice(0,12)+"...":s.name;
    el.innerHTML="<div class=lmi>"+s.icon+"</div><div class=lmt>"+sh+"</div>";
    const info={name:s.name,type:"landmark",cat:s.cat,desc:s.desc,spots:s.spots,dist:"",pop:"",area:"",fiesta:""};
    el.onclick=()=>onTap(el,s.lng,s.lat,()=>showPan(info));
    new mapboxgl.Marker({element:el,anchor:"top"}).setLngLat([s.lng,s.lat]).addTo(map);
    LM.push({el,s});
  });

  function syncZ(){
    const z=map.getZoom();
    BM.forEach(({el})=>{
      if(el.classList.contains("dim"))return;
      el.style.opacity=z<10.8?"0":z<11.3?"0.55":"1";
      el.style.pointerEvents=z<10.8?"none":"auto";
    });
  }
  map.on("zoom",syncZ);syncZ();

  setTimeout(()=>{
    map.easeTo({pitch:20,duration:1600});
    setTimeout(()=>map.easeTo({pitch:0,duration:1200}),2000);
  },700);
});

function onTap(el,lng,lat,cb){
  if(activeEl&&activeEl!==el)activeEl.classList.remove("sel");
  activeEl=el;el.classList.add("sel");
  map.easeTo({center:[lng,lat],zoom:Math.max(map.getZoom(),13),duration:550,easing:t=>1-Math.pow(1-t,3)});
  setTimeout(cb,280);
}

function doFilter(type,chip){
  document.querySelectorAll(".ch").forEach(c=>c.classList.remove("on"));
  chip.classList.add("on");
  let firstHit=null;
  BM.forEach(({el,b})=>{
    let show=type==="all"||(type==="u"&&b.type==="u")||(type==="r"&&b.type==="r")||(type==="t"&&b.type==="t");
    if(type==="lm")show=false;
    el.classList.toggle("dim",!show);
    if(show){el.style.opacity="1";if(!firstHit)firstHit=[b.lng,b.lat];}
    else el.style.opacity="";
  });
  LM.forEach(({el})=>{
    const show=type==="all"||type==="lm";
    el.classList.toggle("dim",!show);
    if(show)el.style.opacity="1";
    else el.style.opacity="";
  });
  // Fly to city overview when filtering
  if(type!=="all") map.flyTo({center:CENTER,zoom:INITIAL_ZOOM,duration:800});
}

function doSearch(v){
  const q=v.trim().toLowerCase();
  if(!q){BM.forEach(({el})=>el.classList.remove("dim"));LM.forEach(({el})=>el.classList.remove("dim"));return;}
  let hit=null,hitEl=null;
  BM.forEach(({el,b})=>{
    const m=b.name.toLowerCase().includes(q);
    el.classList.toggle("dim",!m);
    if(m&&!hit){hit=[b.lng,b.lat];hitEl=el;}
  });
  LM.forEach(({el,s})=>{
    const m=s.name.toLowerCase().includes(q);
    el.classList.toggle("dim",!m);
    if(m&&!hit){hit=[s.lng,s.lat];hitEl=el;}
  });
  if(hit){
    // Remove dim from matched marker so it's visible
    if(hitEl){hitEl.classList.remove("dim");hitEl.style.opacity="1";}
    // Fly to zoom 15, offset center down so marker shows below chips
    map.flyTo({
      center:hit,
      zoom:15,
      duration:900,
      offset:[0,80],
      essential:true
    });
    // Auto-open info panel after flying
    if(hitEl) setTimeout(()=>hitEl.click(),1000);
  }
}

function do3D(){
  is3D=!is3D;
  const btn=document.getElementById("btn3d");
  if(is3D){map.easeTo({pitch:55,bearing:-15,duration:900});btn.innerHTML="&#9634; Disable 3D";btn.style.background="linear-gradient(135deg,#1a3050,#0369a1)";btn.style.border="none";}
  else{map.easeTo({pitch:0,bearing:0,duration:800});btn.innerHTML="&#9635; Enable 3D";btn.style.background="rgba(20,20,20,.92)";btn.style.border="1px solid #444";}
}

function doHome(){map.flyTo({center:CENTER,zoom:11.4,pitch:is3D?55:0,bearing:is3D?-15:0,duration:1100});}

function showPan(p){
  document.getElementById("pname").textContent=p.name;
  const t=document.getElementById("ptype");
  const u=p.type==="u",lm=p.type==="landmark";
  t.textContent=u?"🏙️ Urban Barangay":lm?"📍 "+p.cat:p.type==="t"?"🌿 Rural · Tourist":"🌿 Rural Barangay";
  t.style.background=u?"rgba(231,76,60,.2)":lm?"rgba(230,126,34,.2)":p.type==="t"?"rgba(243,156,18,.2)":"rgba(39,174,96,.2)";
  t.style.color=u?"#ff7675":lm?"#fdcb6e":p.type==="t"?"#fdcb6e":"#55efc4";
  document.getElementById("pdesc").textContent=p.desc||"";
  const f=[];
  if(p.num)f.push("🔢 Brgy. No. "+p.num);
  if(p.dist&&p.dist!=="—")f.push("📍 "+p.dist+" from city");
  if(p.pop&&p.pop!=="—")f.push("👥 Pop. "+p.pop);
  if(p.area&&p.area!=="—")f.push("📐 "+p.area);
  if(p.fiesta&&p.fiesta!=="—")f.push("🎉 "+p.fiesta);
  document.getElementById("pfacts").innerHTML=f.map(x=>"<span class=fp>"+x+"</span>").join("");
  document.getElementById("pspots").innerHTML=p.spots?p.spots.split("|").map(s=>"<span class=sp>"+s+"</span>").join(""):"";
  document.getElementById("pgm").href="https://maps.google.com/?q="+encodeURIComponent(p.name+" Bago City Negros Occidental");
  document.getElementById("pan").classList.add("on");
  document.getElementById("ov").classList.add("on");
}

function hidePan(){
  document.getElementById("pan").classList.remove("on");
  document.getElementById("ov").classList.remove("on");
  if(activeEl){activeEl.classList.remove("sel");activeEl=null;}
}
</script>
