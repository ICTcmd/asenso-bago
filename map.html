<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bago City Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }

    /* Header */
    .map-header {
      background: linear-gradient(135deg, #6b2200, #a03800);
      padding: max(16px, env(safe-area-inset-top)) 16px 16px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 1000;
    }
    .map-header-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }
    .map-header-title { flex: 1; }
    .map-header-title h1 { font-size: 16px; font-weight: 800; color: #fff; }
    .map-header-title p { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    .map-header img { width: 36px; height: 36px; border-radius: 50%; opacity: 0.9; }

    /* Legend */
    .map-legend {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 10px 16px; background: #fff;
      border-bottom: 1px solid #f1f5f9;
      font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-weight: 600; color: #475569; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* Map container */
    #map {
      height: calc(100vh - 130px);
      width: 100%;
    }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      border-radius: 16px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: #fff !important; }

    .popup-header {
      padding: 14px 16px 10px;
      color: #fff;
    }
    .popup-num { font-size: 10px; font-weight: 700; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
    .popup-name { font-size: 18px; font-weight: 900; line-height: 1.1; margin-top: 2px; }
    .popup-type { font-size: 11px; font-weight: 700; opacity: 0.85; margin-top: 4px; }

    .popup-body { padding: 12px 16px 16px; background: #fff; }
    .popup-desc { font-size: 12px; color: #64748b; line-height: 1.6; margin-bottom: 10px; }

    .popup-fact {
      font-size: 11px; font-weight: 700; color: #0284c7;
      background: rgba(2,132,199,0.08); border-radius: 6px;
      padding: 4px 8px; margin-bottom: 5px; display: inline-block;
    }
    .popup-spot {
      font-size: 11px; font-weight: 700; color: #d97706;
      background: rgba(217,119,6,0.08); border-radius: 6px;
      padding: 4px 8px; margin-bottom: 5px; display: block;
    }
    .popup-map-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 12px; padding: 10px;
      background: linear-gradient(135deg, #6b2200, #a03800);
      color: #fff; border-radius: 10px;
      font-size: 12px; font-weight: 700; text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="map-header">
    <a href="javascript:history.back()" class="map-header-back" aria-label="Go back">←</a>
    <div class="map-header-title">
      <h1>Bago City Interactive Map</h1>
      <p>Tap any barangay marker for details</p>
    </div>
    <img src="assets/images/bago-city-logo.png" alt="Bago City" />
  </div>

  <!-- Legend -->
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b;"></div> Urban Barangay</div>
    <div class="legend-item"><div class="legend-dot" style="background:#059669;"></div> Rural Barangay</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706;"></div> Has Tourist Spot</div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEg=" crossorigin=""></script>
  <script>
    // Initialize map centered on Bago City
    const map = L.map('map', {
      center: [10.5388, 122.8384],
      zoom: 12,
      zoomControl: true
    });

    // OpenStreetMap tiles — completely free
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // Barangay data with coordinates, type, descriptions, tourist spots
    const barangays = [
      {
        name: 'Abuanan', num: '01', type: 'urban', color: '#c0392b',
        lat: 10.5650, lng: 122.7980,
        desc: 'One of the 8 urban barangays of Bago City. Located near the northern boundary of the city.',
        facts: [], spots: []
      },
      {
        name: 'Alianza', num: '02', type: 'rural', color: '#059669',
        lat: 10.5200, lng: 122.8100,
        desc: 'A rural barangay known for its agricultural lands and rice production.',
        facts: [], spots: []
      },
      {
        name: 'Atipuluan', num: '03', type: 'urban', color: '#c0392b',
        lat: 10.5500, lng: 122.8200,
        desc: 'An urban barangay along the main highway. A key commercial and residential area.',
        facts: [], spots: []
      },
      {
        name: 'Bacong-Montilla', num: '04', type: 'rural', color: '#059669',
        lat: 10.4800, lng: 122.9500,
        desc: 'The largest barangay in Bago City by land area with 4,827 hectares of agricultural and forest land.',
        facts: ['Largest barangay by land area (4,827 ha)'], spots: []
      },
      {
        name: 'Bagroy', num: '05', type: 'rural', color: '#059669',
        lat: 10.5900, lng: 122.7500,
        desc: 'A coastal rural barangay with access to the Guimaras Strait. Known for its fishing community.',
        facts: ['Smallest population (1,305 residents)'], spots: []
      },
      {
        name: 'Balingasag', num: '06', type: 'urban', color: '#c0392b',
        lat: 10.5580, lng: 122.8350,
        desc: 'An urban barangay near the city center with residential and commercial establishments.',
        facts: [], spots: []
      },
      {
        name: 'Binubuhan', num: '07', type: 'rural', color: '#059669',
        lat: 10.5100, lng: 122.8600,
        desc: 'A rural barangay known for rice production. Part of Cluster 8 with Ma-ao and Mailum.',
        facts: [], spots: []
      },
      {
        name: 'Busay', num: '08', type: 'rural', color: '#d97706',
        lat: 10.5300, lng: 122.9000,
        desc: 'A mountain barangay with scenic views toward Mt. Kanlaon. Near agricultural resorts.',
        facts: [], spots: ['Near Buenos Aires Mountain Resort area']
      },
      {
        name: 'Calumangan', num: '09', type: 'rural', color: '#059669',
        lat: 10.5450, lng: 122.8700,
        desc: 'A rural barangay in the agricultural heartland of Bago City with fertile rice paddies.',
        facts: [], spots: []
      },
      {
        name: 'Caridad', num: '10', type: 'urban', color: '#c0392b',
        lat: 10.5420, lng: 122.8300,
        desc: 'An urban barangay forming part of the Bago City urban core with schools and local businesses.',
        facts: [], spots: []
      },
      {
        name: 'Don Jorge L. Araneta', num: '11', type: 'urban', color: '#d97706',
        lat: 10.5380, lng: 122.8450,
        desc: 'Named after Gen. Juan A. Araneta who led the bloodless revolution of November 5, 1898.',
        facts: [], spots: ['Araneta Family Heritage Site']
      },
      {
        name: 'Dulao', num: '12', type: 'rural', color: '#059669',
        lat: 10.5700, lng: 122.8050,
        desc: 'A rural barangay historically connected to the Bacolod-Bago border area.',
        facts: [], spots: []
      },
      {
        name: 'Ilijan', num: '13', type: 'rural', color: '#d97706',
        lat: 10.4300, lng: 122.7200,
        desc: 'The farthest barangay from city proper at 30.5 km. Coastal barangay along Guimaras Strait. President Quezon stayed here in WWII.',
        facts: ['Farthest barangay (30.5 km away)'],
        spots: ['Buenos Aires Mountain Resort — WWII Historical Site']
      },
      {
        name: 'Lag-Asan', num: '14', type: 'rural', color: '#059669',
        lat: 10.5050, lng: 122.8400,
        desc: 'A peaceful rural barangay with agricultural activities in the interior of Bago City.',
        facts: [], spots: []
      },
      {
        name: 'Ma-ao', num: '15', type: 'urban', color: '#d97706',
        lat: 10.5150, lng: 122.8750,
        desc: 'The most populous barangay in Bago City. Home to the historic Ma-ao Sugar Central.',
        facts: ['Most populated barangay (14,916 residents)'],
        spots: ['Ma-ao Sugar Central — Heritage industrial site']
      },
      {
        name: 'Mailum', num: '16', type: 'rural', color: '#d97706',
        lat: 10.4950, lng: 122.9200,
        desc: 'Home to the famous Kipot Twin Falls and Pataan Mountain Resort. Prime ecotourism destination at the foot of Kanlaon Volcano.',
        facts: [],
        spots: ['Kipot Twin Falls — 220 steps to twin cascading waterfalls', 'Pataan Mountain Resort — Near Kanlaon Volcano']
      },
      {
        name: 'Malingin', num: '17', type: 'rural', color: '#059669',
        lat: 10.5600, lng: 122.8600,
        desc: 'A rural barangay with a close-knit farming community and scenic agricultural landscape.',
        facts: [], spots: []
      },
      {
        name: 'Napoles', num: '18', type: 'rural', color: '#059669',
        lat: 10.5250, lng: 122.8200,
        desc: 'A rural barangay contributing to Bago City\'s status as a top rice producer in Negros Occidental.',
        facts: [], spots: []
      },
      {
        name: 'Pacol', num: '19', type: 'rural', color: '#059669',
        lat: 10.5350, lng: 122.8100,
        desc: 'A rural barangay with fertile lands for farming in the interior portions of Bago City.',
        facts: [], spots: []
      },
      {
        name: 'Poblacion', num: '20', type: 'urban', color: '#d97706',
        lat: 10.5350, lng: 122.8380,
        desc: 'The main downtown barangay — seat of local government. Home to City Hall, Bantayan Park, and the Cathedral.',
        facts: ['Smallest land area (311 hectares)', 'City center and seat of government'],
        spots: ['Bantayan Park — Historic 1898 revolution site', 'Balay ni Tan Juan — Ancestral house', 'Bago City Cathedral (San Sebastian)', 'Javellana Mansion (Balay Daku)']
      },
      {
        name: 'Sagasa', num: '21', type: 'rural', color: '#059669',
        lat: 10.5850, lng: 122.7700,
        desc: 'A coastal rural barangay along the Guimaras Strait. Known for fishing activities.',
        facts: [], spots: []
      },
      {
        name: 'Sampinit', num: '22', type: 'rural', color: '#059669',
        lat: 10.4700, lng: 122.9100,
        desc: 'A rural barangay near Mt. Kanlaon Natural Park with forested mountain areas.',
        facts: [], spots: []
      },
      {
        name: 'Tabunan', num: '23', type: 'rural', color: '#059669',
        lat: 10.5750, lng: 122.7850,
        desc: 'A rural barangay with strong agricultural heritage historically connected to the region.',
        facts: [], spots: []
      },
      {
        name: 'Taloc', num: '24', type: 'urban', color: '#c0392b',
        lat: 10.5480, lng: 122.8250,
        desc: 'An urban barangay near the city center with established residential communities.',
        facts: [], spots: []
      }
    ];

    // Create custom circular markers
    function createMarker(brgy) {
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          width:36px;height:36px;border-radius:50%;
          background:${brgy.color};
          border:3px solid #fff;
          box-shadow:0 2px 8px rgba(0,0,0,0.3);
          display:flex;align-items:center;justify-content:center;
          color:#fff;font-size:9px;font-weight:900;text-align:center;
          line-height:1.1;cursor:pointer;
        ">${brgy.num}</div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18],
        popupAnchor: [0, -20]
      });
      return icon;
    }

    // Add markers for each barangay
    barangays.forEach(brgy => {
      const spotsHtml = brgy.spots.map(s =>
        `<div class="popup-spot">⭐ ${s}</div>`
      ).join('');
      const factsHtml = brgy.facts.map(f =>
        `<div class="popup-fact">📊 ${f}</div>`
      ).join('');

      const popupHtml = `
        <div class="popup-header" style="background:${brgy.color};">
          <div class="popup-num">Barangay ${brgy.num}</div>
          <div class="popup-name">${brgy.name}</div>
          <div class="popup-type">${brgy.type === 'urban' ? '🏙️ Urban Barangay' : brgy.spots.length ? '⭐ Rural · Has Tourist Spots' : '🌿 Rural Barangay'}</div>
        </div>
        <div class="popup-body">
          <p class="popup-desc">${brgy.desc}</p>
          ${factsHtml}
          ${spotsHtml}
          <a class="popup-map-btn" href="https://maps.google.com/?q=${encodeURIComponent(brgy.name + ' Bago City Negros Occidental')}" target="_blank" rel="noopener">
            📍 Open in Google Maps
          </a>
        </div>
      `;

      L.marker([brgy.lat, brgy.lng], { icon: createMarker(brgy) })
        .addTo(map)
        .bindPopup(popupHtml, { maxWidth: 280, minWidth: 260 });
    });

    // Add Bago City boundary circle for reference
    L.circle([10.5388, 122.8384], {
      color: '#7a2800',
      fillColor: '#a03800',
      fillOpacity: 0.05,
      weight: 2,
      dashArray: '6 4',
      radius: 18000
    }).addTo(map).bindPopup('<b>City of Bago</b><br>Negros Occidental, Philippines<br>24 Barangays · 401 km²');
  </script>
</body>
</html>
