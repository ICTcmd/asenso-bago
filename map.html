<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bago City Interactive Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1628; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.hdr {
  background: linear-gradient(135deg, #6b2200, #a03800);
  padding: max(14px, env(safe-area-inset-top)) 16px 14px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  z-index: 10;
}
.bk { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
.hi { flex: 1; }
.hi h1 { font-size: 16px; font-weight: 800; color: #fff; }
.hi p  { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 1px; }
.hdr img { width: 36px; height: 36px; border-radius: 50%; }

/* Tab bar */
.tabs { display: flex; background: #111; flex-shrink: 0; border-bottom: 1px solid #222; }
.tab { flex: 1; padding: 11px 8px; font-size: 12px; font-weight: 700; color: #888; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
.tab.active { color: #fff; border-bottom-color: #a03800; background: #1a1a1a; }

/* Map container */
.map-wrap { flex: 1; position: relative; overflow: hidden; }

/* Mapbox iframe embed */
#mapframe {
  width: 100%; height: 100%; border: none;
  display: block;
}

/* Skeleton loader */
.skeleton {
  position: absolute; inset: 0;
  background: #0d2137;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; z-index: 5;
  transition: opacity .4s ease;
}
.skeleton.gone { opacity: 0; pointer-events: none; }
.sk-logo { width: 64px; height: 64px; border-radius: 50%; opacity: .8; }
.sk-text { font-size: 14px; font-weight: 700; color: rgba(255,255,255,.7); }
.sk-sub { font-size: 11px; color: rgba(255,255,255,.35); }
.sk-bar { width: 160px; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.sk-fill { height: 100%; background: linear-gradient(90deg, #6b2200, #f39c12); border-radius: 2px; animation: fill 1.8s ease forwards; }
@keyframes fill { 0%{width:0%} 60%{width:75%} 100%{width:92%} }

/* Barangay overlay panel */
.brgy-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(15,15,20,0.96);
  border-top: 1px solid #2a2a2a;
  max-height: 42vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 0 20px;
  transform: translateY(100%);
  transition: transform .3s ease;
  z-index: 20;
}
.brgy-panel.open { transform: translateY(0); }
.brgy-panel-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 12px; }
.brgy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 12px; }
.brgy-btn {
  padding: 10px 6px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 10px; font-weight: 700; color: #fff; text-align: center;
  line-height: 1.3; transition: transform .15s, filter .15s;
}
.brgy-btn:active { transform: scale(0.95); filter: brightness(1.2); }
.brgy-btn.u { background: linear-gradient(135deg, #c0392b, #922b21); }
.brgy-btn.r { background: linear-gradient(135deg, #27ae60, #1e8449); }
.brgy-btn.t { background: linear-gradient(135deg, #e67e22, #a04000); }

/* Toggle barangay button */
.toggle-brgy {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #6b2200, #a03800);
  color: #fff; border: none; border-radius: 24px; padding: 10px 22px;
  font-size: 13px; font-weight: 700; cursor: pointer; z-index: 15;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  white-space: nowrap;
  transition: transform .15s;
}
.toggle-brgy:active { transform: translateX(-50%) scale(0.97); }

/* Info panel */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 199; display: none; backdrop-filter: blur(6px); }
.overlay.on { display: block; }
.panel {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 520px;
  background: #1c1c1e; border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px;
  box-shadow: 0 -8px 48px rgba(0,0,0,.8);
  z-index: 200; display: none;
  border-top: 3px solid #a03800;
  max-height: 80vh; overflow-y: auto;
}
.panel.on { display: block; animation: sup .3s cubic-bezier(.2,.8,.3,1); }
@keyframes sup { from { transform: translateX(-50%) translateY(100%); } to { transform: translateX(-50%) translateY(0); } }
.ph { width: 38px; height: 4px; background: #3a3a3c; border-radius: 2px; margin: 0 auto 16px; }
.pc { position: absolute; top: 18px; right: 18px; width: 30px; height: 30px; border-radius: 50%; background: #2c2c2e; border: none; color: #aaa; font-size: 20px; cursor: pointer; line-height: 30px; text-align: center; }
#pname { font-size: 21px; font-weight: 900; color: #fff; margin-bottom: 5px; }
#ptype { display: inline-block; font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
#pdesc { font-size: 13px; color: #999; line-height: 1.65; margin-bottom: 10px; }
.pr { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.fp { background: #1a3050; color: #74b9ff; font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }
.sp { background: #3d1500; color: #fdcb6e; font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }
.gm { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; padding: 14px; background: linear-gradient(135deg, #0369a1, #0ea5e9); color: #fff; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>

<div class="hdr">
  <a href="javascript:history.back()" class="bk">&#8592;</a>
  <div class="hi"><h1>Bago City Interactive Map</h1><p>Real roads • Barangays • Landmarks</p></div>
  <img src="assets/images/bago-city-logo.png" alt="Bago City">
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('map')">🗺️ Map</button>
  <button class="tab" onclick="showTab('barangays')">🏘️ Barangays</button>
  <button class="tab" onclick="showTab('spots')">⭐ Tourist Spots</button>
</div>

<!-- MAP TAB -->
<div class="map-wrap" id="tab-map">
  <div class="skeleton" id="skeleton">
    <img class="sk-logo" src="assets/images/bago-city-logo.png" alt="">
    <div class="sk-text">Bago City Interactive Map</div>
    <div class="sk-sub">Loading map...</div>
    <div class="sk-bar"><div class="sk-fill"></div></div>
  </div>
  <iframe
    id="mapframe"
    src="https://api.mapbox.com/styles/v1/mapbox/streets-v12.html?title=false&access_token=pk.eyJ1IjoiaWN0YmFnbyIsImEiOiJjbXB5czIxNzYwNGozMnJwdWRxbzltaml0In0.bB042ep_ICri40J2x2pPow#12/10.535/122.838"
    onload="document.getElementById('skeleton').classList.add('gone')"
    allow="geolocation"
    title="Bago City Map">
  </iframe>
  <button class="toggle-brgy" onclick="toggleBrgy()">🏘️ View Barangays</button>

  <!-- Barangay quick-select overlay -->
  <div class="brgy-panel" id="brgy-panel">
    <div class="brgy-panel-handle"></div>
    <div class="brgy-grid" id="brgy-grid"></div>
  </div>
</div>

<!-- BARANGAYS TAB -->
<div class="map-wrap" id="tab-barangays" style="display:none; overflow-y:auto; padding:12px;">
  <div id="brgy-list"></div>
</div>

<!-- TOURIST SPOTS TAB -->
<div class="map-wrap" id="tab-spots" style="display:none; overflow-y:auto; padding:12px;">
  <div id="spots-list"></div>
</div>

<!-- Info panel -->
<div class="overlay" id="overlay" onclick="hide()"></div>
<div class="panel" id="panel">
  <button class="pc" onclick="hide()">&#215;</button>
  <div class="ph"></div>
  <div id="pname"></div>
  <span id="ptype"></span>
  <p id="pdesc"></p>
  <div class="pr" id="pfacts"></div>
  <div class="pr" id="pspots"></div>
  <a class="gm" id="pgm" href="#" target="_blank" rel="noopener">📍 View on Google Maps</a>
</div>

<script>
const DATA = [
  { name:'Abuanan',           type:'u', dist:'25 km',   area:'1,040 ha', pop:'5,700',  fiesta:'Hublag Festival (Last Sat of Feb)', desc:'An urban barangay in the northeast known for quarries and rice mills.', spots:'' },
  { name:'Alianza',           type:'r', dist:'15 km',   area:'365 ha',   pop:'3,211',  fiesta:'February 2', desc:'A rural barangay known for agricultural lands and rice production.', spots:'' },
  { name:'Atipuluan',         type:'u', dist:'17.46 km',area:'562 ha',   pop:'4,269',  fiesta:'Pasiduong Festival (May 15)', desc:'An urban barangay along the main highway — key commercial and residential hub.', spots:'' },
  { name:'Bacong-Montilla',   type:'r', dist:'29.50 km',area:'4,827 ha', pop:'7,844',  fiesta:'Lumbayag Festival (March 26)', desc:'Largest barangay by land area with vast agricultural and forest lands.', spots:'' },
  { name:'Bagroy',            type:'r', dist:'11 km',   area:'399 ha',   pop:'1,694',  fiesta:'February 11', desc:'Smallest population in Bago City. A coastal barangay along the Guimaras Strait.', spots:'' },
  { name:'Balingasag',        type:'u', dist:'1.25 km', area:'436 ha',   pop:'4,498',  fiesta:'Zumbali Festival (May 31)', desc:'An urban barangay with commercial establishments near the city center.', spots:'' },
  { name:'Binubuhan',         type:'r', dist:'29.50 km',area:'2,352 ha', pop:'5,581',  fiesta:'Lechon Festival (April 17)', desc:'A rural barangay in Cluster 8 with Ma-ao and Mailum.', spots:'' },
  { name:'Busay',             type:'t', dist:'7.26 km', area:'1,463 ha', pop:'6,896',  fiesta:'Sinadya Festival (March 3)', desc:'A rural barangay stretching from lowlands to upland areas with scenic mountain views.', spots:'⭐ Buenos Aires Mountain Resort' },
  { name:'Calumangan',        type:'r', dist:'6.40 km', area:'1,007 ha', pop:'7,979',  fiesta:'Kalumangan Festival (May 15)', desc:'A rural barangay known for rice mills and the Bago River watershed.', spots:'' },
  { name:'Caridad',           type:'u', dist:'12 km',   area:'—',        pop:'4,901',  fiesta:'Dinagaw Festival (2nd Sat of March)', desc:'An urban barangay forming part of the Bago City urban core.', spots:'' },
  { name:'Don Jorge L. Araneta',type:'u',dist:'16.90 km',area:'2,143 ha',pop:'9,457',  fiesta:'Manupak-tapas Festival (Dec 8)', desc:'Named after Gen. Juan A. Araneta who led the 1898 revolution against Spanish rule.', spots:'⭐ Araneta Heritage Site' },
  { name:'Dulao',             type:'r', dist:'17.8 km', area:'2,439 ha', pop:'10,111', fiesta:'Hataw Dance Festival (Dec 8)', desc:'A rural barangay traversed by the Bago River with fertile agricultural land.', spots:'' },
  { name:'Ilijan',            type:'t', dist:'36.99 km',area:'1,489 ha', pop:'5,581',  fiesta:'December 11', desc:'Farthest barangay (36.99 km). Coastal barangay where President Quezon stayed in 1942 during WWII.', spots:'⭐ WWII Historical Site (Pres. Quezon 1942)|⭐ Coastal ecotourism' },
  { name:'Lag-Asan',          type:'r', dist:'1.60 km', area:'456 ha',   pop:'11,794', fiesta:'March 3 (Simadya)', desc:'A rural barangay south of Poblacion, known for the Hundred Hills Nature Resort.', spots:'⭐ Hundred Hills Nature Resort' },
  { name:'Ma-ao',             type:'t', dist:'21.70 km',area:'5,998 ha', pop:'14,916', fiesta:'Mabaw-Malaw Festival (Dec 30)', desc:'Most populated barangay in Bago City. Home to the historic Ma-ao Sugar Central.', spots:'⭐ Ma-ao Sugar Central (Heritage site)|⭐ MSC Ruins (Lacson Mansion)' },
  { name:'Mailum',            type:'t', dist:'29.46 km',area:'3,200 ha', pop:'8,844',  fiesta:'Ginom-Ginom Festival (March 19)', desc:'Prime ecotourism destination at the foot of Mt. Kanlaon. Home to Kipot Twin Falls.', spots:'⭐ Kipot Twin Falls (220 steps)|⭐ Pataan Mountain Resort|⭐ Kipot Summer Resort' },
  { name:'Malingin',          type:'r', dist:'12.20 km',area:'1,495 ha', pop:'6,649',  fiesta:'Palakad Festival (March 19)', desc:'A rural barangay in the central area known for rice mills and farming communities.', spots:'' },
  { name:'Napoles',           type:'r', dist:'9.26 km', area:'1,279 ha', pop:'6,564',  fiesta:'Kasalipan Festival (March 30)', desc:'A rural barangay known for rice mills and rice fields.', spots:'' },
  { name:'Pacol',             type:'r', dist:'7.20 km', area:'—',        pop:'3,999',  fiesta:'December 12', desc:'A rural barangay near the city center along the coastal area.', spots:'' },
  { name:'Poblacion',         type:'t', dist:'0 km',    area:'311 ha',   pop:'11,794', fiesta:'Fiesta of San Sebastian (Jan)', desc:'The main downtown — seat of local government. Smallest land area (311 ha). City center.', spots:'⭐ Bantayan Park (1898 Revolution)|⭐ Balay ni Tan Juan|⭐ Bago City Cathedral|⭐ Javellana Mansion' },
  { name:'Sagasa',            type:'r', dist:'—',       area:'—',        pop:'—',      fiesta:'—', desc:'A coastal rural barangay along the Guimaras Strait, known for fishing and mangrove forests.', spots:'' },
  { name:'Sampinit',          type:'r', dist:'11 km',   area:'553 ha',   pop:'6,856',  fiesta:'Sinadya Festival (March 3)', desc:'A rural barangay east of the city center bordering Mt. Kanlaon Natural Park.', spots:'' },
  { name:'Tabunan',           type:'r', dist:'—',       area:'—',        pop:'—',      fiesta:'—', desc:'A rural barangay in the north with mangrove forests and rice fields.', spots:'' },
  { name:'Taloc',             type:'u', dist:'—',       area:'—',        pop:'—',      fiesta:'—', desc:'An urban barangay in the northwest bordering Bacolod City.', spots:'' },
];

const SPOTS = [
  { name:'Bantayan Park', icon:'🏛️', loc:'Poblacion', desc:'Historic riverside park — site of the November 5, 1898 revolution by Gen. Juan Araneta. Cannon festival held annually.', lat:10.497, lng:122.834 },
  { name:'Bago City Cathedral (San Sebastian)', icon:'⛪', loc:'Poblacion', desc:'Spanish-colonial cathedral dedicated to San Sebastian, patron saint of Bago City.', lat:10.497, lng:122.833 },
  { name:'Javellana Mansion (Balay Daku)', icon:'🏰', loc:'Poblacion', desc:'Built in 1920 on a 440-ha sugar plantation, designed by an Italian architect. One of Bago Citys most prized heritage landmarks.', lat:10.495, lng:122.830 },
  { name:'Balay ni Tan Juan', icon:'🏡', loc:'Poblacion', desc:'Well-preserved ancestral house offering a glimpse into the rich cultural heritage and history of Bago City.', lat:10.496, lng:122.832 },
  { name:'Ma-ao Sugar Central', icon:'🏭', loc:'Ma-ao', desc:'Historic sugar mill — Ma-ao Sugar Central (MSC). Heritage industrial landmark in the most populated barangay.', lat:10.460, lng:122.895 },
  { name:'Kipot Twin Falls', icon:'💧', loc:'Mailum', desc:'Stunning twin waterfalls at the foot of Mt. Kanlaon. Reached via 220 steps. Cold, refreshing water — perfect for family trips.', lat:10.400, lng:122.908 },
  { name:'Pataan Mountain Resort', icon:'⛰️', loc:'Mailum', desc:'Mountain getaway near Kanlaon Volcano with scenic views and fresh mountain air.', lat:10.395, lng:122.915 },
  { name:'Buenos Aires Mountain Resort', icon:'🌄', loc:'Busay', desc:'Scenic mountain resort with breathtaking views of Bago City and the surrounding landscape.', lat:10.540, lng:122.850 },
  { name:'Hundred Hills Nature Resort', icon:'🌿', loc:'Lag-Asan', desc:'Nature resort with rolling hills and lush greenery south of the city proper.', lat:10.475, lng:122.835 },
  { name:'Kipot Summer Resort', icon:'🏖️', loc:'Mailum', desc:'Popular summer resort destination near Kipot Twin Falls.', lat:10.412, lng:122.920 },
  { name:'Rafael Salas Park & Nature Center', icon:'🌳', loc:'Poblacion', desc:'Named after Rafael Salas, UN Under-Secretary General from Bago City. A green sanctuary for families.', lat:10.498, lng:122.836 },
];

// Build barangay grid (map overlay)
const grid = document.getElementById('brgy-grid');
DATA.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'brgy-btn ' + b.type;
  btn.textContent = b.name;
  btn.onclick = () => { toggleBrgy(); showInfo(b); };
  grid.appendChild(btn);
});

// Build barangay list tab
const list = document.getElementById('brgy-list');
const typeLabel = t => t==='u'?'🏙️ Urban':t==='t'?'🌿 Rural · Tourist':'🌿 Rural';
const typeColor = t => t==='u'?'#e74c3c':t==='t'?'#e67e22':'#27ae60';
DATA.forEach(b => {
  list.innerHTML += `
  <div onclick="showInfo(DATA.find(x=>x.name==='${b.name.replace(/'/g,"\\'")}'))" style="background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border-left:4px solid ${typeColor(b.type)}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:14px;font-weight:800;color:#fff">${b.name}</span>
      <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:${typeColor(b.type)}22;color:${typeColor(b.type)}">${typeLabel(b.type)}</span>
    </div>
    <div style="font-size:11px;color:#666;display:flex;gap:12px;flex-wrap:wrap">
      ${b.dist!=='—'?`<span>📍 ${b.dist}</span>`:''}
      ${b.pop!=='—'?`<span>👥 ${b.pop}</span>`:''}
      ${b.area!=='—'?`<span>📐 ${b.area}</span>`:''}
    </div>
    ${b.fiesta!=='—'?`<div style="font-size:10px;color:#a03800;margin-top:4px">🎉 ${b.fiesta}</div>`:''}
    ${b.spots?`<div style="font-size:10px;color:#fdcb6e;margin-top:4px">${b.spots.split('|').map(s=>`<span style="margin-right:6px">${s}</span>`).join('')}</div>`:''}
  </div>`;
});

// Build spots tab
const slist = document.getElementById('spots-list');
SPOTS.forEach(s => {
  slist.innerHTML += `
  <div onclick="showSpot('${s.name.replace(/'/g,"\\'")}')" style="background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border-left:4px solid #e67e22">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="font-size:22px">${s.icon}</span>
      <div>
        <div style="font-size:13px;font-weight:800;color:#fff">${s.name}</div>
        <div style="font-size:10px;color:#888">📍 ${s.loc}</div>
      </div>
    </div>
    <p style="font-size:11px;color:#666;line-height:1.5">${s.desc}</p>
    <a href="https://maps.google.com/?q=${encodeURIComponent(s.name+' Bago City')}" target="_blank" style="display:inline-block;margin-top:8px;font-size:10px;font-weight:700;color:#0ea5e9">📍 Open in Google Maps →</a>
  </div>`;
});

function toggleBrgy() {
  const p = document.getElementById('brgy-panel');
  p.classList.toggle('open');
}

function showInfo(b) {
  if (!b) return;
  document.getElementById('pname').textContent = b.name;
  const t = document.getElementById('ptype');
  const u = b.type==='u';
  t.textContent = u ? '🏙️ Urban Barangay' : '🌿 Rural Barangay';
  t.style.background = u ? 'rgba(231,76,60,0.2)' : 'rgba(39,174,96,0.2)';
  t.style.color = u ? '#ff7675' : '#55efc4';
  document.getElementById('pdesc').textContent = b.desc;
  let facts = [];
  if (b.dist && b.dist!=='—') facts.push('📍 '+b.dist+' from city');
  if (b.pop  && b.pop!=='—')  facts.push('👥 Pop. '+b.pop);
  if (b.area && b.area!=='—') facts.push('📐 '+b.area);
  if (b.fiesta && b.fiesta!=='—') facts.push('🎉 '+b.fiesta);
  document.getElementById('pfacts').innerHTML = facts.map(f=>`<span class="fp">${f}</span>`).join('');
  document.getElementById('pspots').innerHTML = b.spots ? b.spots.split('|').map(s=>`<span class="sp">${s}</span>`).join('') : '';
  document.getElementById('pgm').href = 'https://maps.google.com/?q='+encodeURIComponent(b.name+' Bago City Negros Occidental');
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}

function showSpot(name) {
  const s = SPOTS.find(x => x.name === name);
  if (!s) return;
  document.getElementById('pname').textContent = s.name;
  const t = document.getElementById('ptype');
  t.textContent = '📍 Tourist Spot';
  t.style.background = 'rgba(230,126,34,0.2)';
  t.style.color = '#fdcb6e';
  document.getElementById('pdesc').textContent = s.desc;
  document.getElementById('pfacts').innerHTML = `<span class="fp">📍 ${s.loc}</span>`;
  document.getElementById('pspots').innerHTML = '';
  document.getElementById('pgm').href = 'https://maps.google.com/?q='+encodeURIComponent(s.name+' Bago City Negros Occidental');
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}

function hide() {
  document.getElementById('panel').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

function showTab(tab) {
  ['map','barangays','spots'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? (t==='map'?'block':'block') : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['map','barangays','spots'][i]===tab);
  });
  // fix map tab display
  if (tab === 'map') {
    document.getElementById('tab-map').style.display = 'block';
  }
}

// Fix map-wrap flex sizing for tabs
document.getElementById('tab-map').style.flex = '1';
</script>
</body>
</html>
