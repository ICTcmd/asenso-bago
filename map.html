<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#c0392b">
<title>Bago City Explorer Map</title>
<link rel="preconnect" href="https://api.mapbox.com">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#map{position:fixed;inset:0}

/* ── Loader ── */
#ldr{position:fixed;inset:0;background:linear-gradient(160deg,#1a0a00 0%,#3d1500 50%,#6b2200 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;transition:opacity .6s}
#ldr.done{opacity:0;pointer-events:none}
#ldr img{width:80px;height:80px;border-radius:50%;animation:lp 1.4s ease-in-out infinite;box-shadow:0 0 40px rgba(243,156,18,.6)}
@keyframes lp{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.1) rotate(5deg)}}
#ldr h2{font-size:20px;font-weight:900;color:#fff;text-align:center}
#ldr p{font-size:13px;color:rgba(255,255,255,.55)}
.bw{width:200px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#f39c12,#e74c3c,#ff8c00);animation:bfill 1.5s ease forwards}
@keyframes bfill{0%{width:0}100%{width:95%}}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#c0392b 0%,#e74c3c 50%,#ff8c00 100%);padding:max(12px,env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 4px 24px rgba(192,57,43,.45)}
.bk{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;transition:transform .2s}
.bk:active{transform:scale(.92)}
.hi{flex:1}.hi h1{font-size:15px;font-weight:900;color:#fff;letter-spacing:-.2px}.hi p{font-size:10px;color:rgba(255,255,255,.8);margin-top:2px}
.hdr img{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-badge{background:rgba(255,255,255,.22);padding:4px 10px;border-radius:20px;font-size:9px;font-weight:800;color:#fff;white-space:nowrap}

/* ── Search ── */
.ui-top{position:fixed;top:calc(max(12px,env(safe-area-inset-top)) + 58px);left:0;right:0;z-index:95;padding:0 10px}
.search-wrap{position:relative;display:flex;align-items:center;background:rgba(255,255,255,.98);border-radius:28px;box-shadow:0 4px 20px rgba(0,0,0,.18);border:2px solid transparent;transition:border-color .2s,box-shadow .2s}
.search-wrap:focus-within{border-color:#f39c12;box-shadow:0 4px 24px rgba(243,156,18,.35)}
.search-ico{padding:0 4px 0 14px;font-size:15px;line-height:1;opacity:.5}
.si{flex:1;padding:11px 8px 11px 4px;border:none;background:transparent;font-size:14px;font-weight:600;color:#1a1a1a;outline:none}
.si::placeholder{color:#aaa;font-weight:500}
.search-clear{width:32px;height:32px;margin-right:6px;border-radius:50%;border:none;background:#f0f0f0;color:#666;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.on{display:flex}
.srch-drop{display:none;margin-top:6px;background:rgba(255,255,255,.98);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:220px;overflow-y:auto;scrollbar-width:thin}
.srch-drop.on{display:block;animation:dropIn .2s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.srch-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #f2f2f2;transition:background .15s}
.srch-item:last-child{border-bottom:none}
.srch-item:active,.srch-item:hover{background:#fff8f0}
.srch-item-img{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.srch-item-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.srch-item-ico.star{background:linear-gradient(135deg,#f39c12,#e67e22)}
.srch-item-ico.heritage{background:linear-gradient(135deg,#8e44ad,#9b59b6)}
.srch-item-ico.barangay{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.srch-item-ico.city{background:linear-gradient(135deg,#3498db,#2980b9)}
.srch-item-body{flex:1;min-width:0}
.srch-item-name{font-size:13px;font-weight:800;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srch-item-sub{font-size:10px;color:#888;font-weight:600;margin-top:1px}
.srch-empty{padding:16px;text-align:center;font-size:12px;color:#999}
.srch-hl{background:#ffeaa7;border-radius:3px;padding:0 1px}

/* ── Loading Skeleton ── */
.skeleton{background:#f0f0f0;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skeleton-loading 1.5s ease-in-out infinite;border-radius:4px}
@keyframes skeleton-loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-text{height:12px;margin-bottom:6px}
.skeleton-text.short{width:60%}
.skeleton-text.long{width:90%}
.skeleton-avatar{width:40px;height:40px;border-radius:50%}
.skeleton-img{width:50px;height:50px;border-radius:10px}

/* ── Quick picks ── */
.quick-picks{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 2px;scrollbar-width:none;flex-wrap:nowrap}
.quick-picks::-webkit-scrollbar{display:none}
.srch-popular{padding:12px 14px 8px}
.srch-popular-label{font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.srch-popular-chips{display:flex;gap:6px;flex-wrap:wrap}
.srch-popular-chips .qp{font-size:11px;font-weight:700;padding:6px 12px;border-radius:20px;border:1.5px solid #e8e8e8;background:#f8f8f8;color:#444;cursor:pointer;transition:all .15s;white-space:nowrap}
.srch-popular-chips .qp:active,.srch-popular-chips .qp:hover{background:#fff3e0;border-color:#f39c12;color:#e67e22}
body.dark-mode .srch-popular-label{color:#666}
body.dark-mode .srch-popular-chips .qp{background:#1a1a1a;border-color:#333;color:#ccc}
body.dark-mode .srch-popular-chips .qp:hover{background:#2a1500;border-color:#f39c12;color:#f39c12}
.qp{flex-shrink:0;padding:6px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.9);color:#6b2200;font-size:10px;font-weight:800;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);white-space:nowrap;transition:transform .15s}
.qp:active{transform:scale(.94)}
.qp.star{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}

/* ── Filter chips ── */
.cw{display:flex;gap:6px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
.cw::-webkit-scrollbar{display:none}
.ch{flex-shrink:0;padding:7px 13px;border-radius:20px;border:2px solid rgba(255,255,255,.25);background:rgba(20,10,5,.75);backdrop-filter:blur(12px);color:#eee;font-size:10.5px;font-weight:800;cursor:pointer;transition:all .2s ease;user-select:none;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.ch:active{transform:scale(.94)}
.ch.on{border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(0,0,0,.3)}
.ch.on.ca{background:linear-gradient(135deg,#c0392b,#e74c3c)}
.ch.on.cu{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.ch.on.cr{background:linear-gradient(135deg,#27ae60,#1e8449)}
.ch.on.ct{background:linear-gradient(135deg,#f39c12,#d68910)}
.ch.on.cs{background:linear-gradient(135deg,#ff8c00,#e67e22);box-shadow:0 3px 16px rgba(255,140,0,.5)}
.ch.on.chh{background:linear-gradient(135deg,#8e44ad,#9b59b6)}
.ch.on.cl{background:linear-gradient(135deg,#3498db,#2980b9)}
.ch .cnt{display:inline-block;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:10px;font-size:9px;margin-left:4px}

/* ── Legend ── */
.legend{position:fixed;bottom:88px;left:12px;z-index:88;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-radius:14px;padding:10px 12px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:9px;font-weight:700;color:#555}
.legend-title{font-size:10px;font-weight:900;color:#1a1a1a;margin-bottom:6px}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-row:last-child{margin-bottom:0}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* ── Weather Widget ── */
.weather-widget{position:fixed;top:max(12px,env(safe-area-inset-top));right:12px;z-index:95;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-radius:16px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.3)}
.weather-icon{font-size:24px;flex-shrink:0}
.weather-info{flex:1}
.weather-temp{font-size:16px;font-weight:900;color:#1a1a1a;line-height:1}
.weather-desc{font-size:10px;font-weight:600;color:#666;margin-top:2px}
.weather-refresh{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;color:#666;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.weather-refresh:hover{background:#e0e0e0;color:#333}
.weather-refresh:active{transform:scale(.9)}

/* ── Map controls ── */
.mapboxgl-ctrl-bottom-right{bottom:90px!important;right:12px!important}
.mapboxgl-ctrl-attrib{font-size:9px!important}

/* ── Barangay markers ── */
.bp{cursor:pointer;animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both;transition:opacity .3s,filter .3s}
.bp:hover .bpill{transform:scale(1.12)}
.bp.sel .bpill{transform:scale(1.18);box-shadow:0 0 0 3px #fff,0 4px 20px rgba(255,255,255,.5)}
.bp.dim{opacity:.08!important;pointer-events:none!important}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.bpill{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.95);box-shadow:0 2px 10px rgba(0,0,0,.45);white-space:nowrap;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.bp.u .bpill{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.bp.r .bpill{background:linear-gradient(135deg,#27ae60,#1e8449)}
.bp.t .bpill{background:linear-gradient(135deg,#f39c12,#e67e22);box-shadow:0 2px 12px rgba(243,156,18,.6)}

/* ── Landmark markers ── */
.lm{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.lm:hover{transform:scale(1.15)}
.lm.sel{transform:scale(1.25)}
.lm.dim{opacity:.06!important;pointer-events:none!important}
.lmi{width:40px;height:40px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 14px rgba(0,0,0,.45);transition:box-shadow .2s;position:relative}
.lm-star .lmi{width:52px;height:52px;font-size:22px;background:linear-gradient(135deg,#ff8c00,#f39c12 40%,#e74c3c);box-shadow:0 4px 20px rgba(255,140,0,.55)}
.lm-star .lmi::before{content:"⭐";position:absolute;top:-10px;right:-8px;font-size:14px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));animation:starWiggle 2s ease-in-out infinite}
@keyframes starWiggle{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.15)}}
.lm-star .lmi::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:3px solid rgba(255,140,0,.5);animation:ring 2.2s ease-out infinite}
.lm-heritage .lmi{background:linear-gradient(135deg,#8e44ad,#9b59b6);font-size:17px}
.lm-heritage .lmi::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(142,68,173,.45);animation:ring 2.5s ease-out infinite}
.lm-city .lmi{width:34px;height:34px;font-size:15px;background:linear-gradient(135deg,#5d6d7e,#7f8c8d);opacity:.92}
.lm-city .lmt{opacity:.85}
.lmt{padding:3px 8px;border-radius:10px;font-size:9px;font-weight:900;color:#fff;background:rgba(30,20,10,.88);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.lm-star .lmt{background:linear-gradient(135deg,#d35400,#e67e22);font-size:9.5px;max-width:120px}
@keyframes ring{0%{transform:scale(1);opacity:.85}70%,100%{transform:scale(1.7);opacity:0}}

/* ── FABs ── */
.fabs{position:fixed;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:90}
.fab{padding:11px 16px;border-radius:24px;border:none;cursor:pointer;font-size:11px;font-weight:800;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.4);white-space:nowrap;display:flex;align-items:center;gap:5px;transition:transform .2s;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.93)}
.f3d{background:rgba(25,25,30,.92);backdrop-filter:blur(8px);border:1px solid #444}
.fhome{background:linear-gradient(135deg,#c0392b,#ff8c00)}
.ftour{background:linear-gradient(135deg,#f39c12,#e67e22)}
.floc{background:linear-gradient(135deg,#3498db,#2980b9)}
.fdark{background:linear-gradient(135deg,#2c3e50,#34495e)}

/* ── Dark Mode ── */
body.dark-mode{background:#0a0a0a}
body.dark-mode .search-wrap{background:rgba(30,30,30,.95);border-color:#333}
body.dark-mode .si{color:#fff}
body.dark-mode .si::placeholder{color:#666}
body.dark-mode .srch-drop{background:rgba(30,30,30,.95)}
body.dark-mode .srch-item{border-bottom-color:#333}
body.dark-mode .srch-item:active,body.dark-mode .srch-item:hover{background:#1a1a1a}
body.dark-mode .srch-item-name{color:#fff}
body.dark-mode .srch-item-sub{color:#888}
body.dark-mode .weather-widget{background:rgba(30,30,30,.95);border-color:#333}
body.dark-mode .weather-temp{color:#fff}
body.dark-mode .weather-desc{color:#888}
body.dark-mode .legend{background:rgba(30,30,30,.94)}
body.dark-mode .legend-title{color:#fff}
body.dark-mode .legend-row{color:#aaa}

/* ── Detail panel ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;display:none;backdrop-filter:blur(6px)}
.ov.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.pan{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:linear-gradient(180deg,#252528 0%,#1c1c1e 100%);border-radius:24px 24px 0 0;padding:20px 20px max(36px,env(safe-area-inset-bottom));z-index:300;display:none;border-top:4px solid #f39c12;box-shadow:0 -10px 48px rgba(0,0,0,.75);max-height:80vh;overflow-y:auto}
.pan.on{display:block;animation:su .35s cubic-bezier(.25,.46,.45,.94)}
@keyframes su{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.ph{width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 14px}
.pc{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:#333;border:none;color:#aaa;font-size:20px;cursor:pointer}
.pan-hero{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pan-ico{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.pan-ico.star{background:linear-gradient(135deg,#ff8c00,#f39c12)}
.pan-ico.heritage{background:linear-gradient(135deg,#8e44ad,#9b59b6)}
.pan-ico.barangay{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.pan-ico.city{background:linear-gradient(135deg,#3498db,#2980b9)}
#pname{font-size:20px;font-weight:900;color:#fff;line-height:1.2}
#ptype{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
#pdesc{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:10px}
.pr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fp{background:#1a3050;color:#74b9ff;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px}
.sp{background:linear-gradient(135deg,#3d1500,#5c2e00);color:#fdcb6e;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px;border:1px solid rgba(253,203,110,.2)}
.gm{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;padding:14px;background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;border-radius:14px;font-size:13px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div id="ldr">
  <img src="assets/images/bago-city-logo.png" alt="">
  <h2>🗺️ Bago City Explorer</h2>
  <p>Discover waterfalls, heritage sites &amp; hidden gems...</p>
  <div class="bw"><div class="bf"></div></div>
</div>
<div id="map"></div>

<div class="hdr">
  <a href="javascript:history.back()" class="bk" aria-label="Go back">&#8592;</a>
  <div class="hi">
    <h1>🌟 Bago City Explorer</h1>
    <p>Tap markers · Search spots · Explore!</p>
  </div>
  <span class="hdr-badge" id="spot-count">15 spots</span>
  <img src="assets/images/bago-city-logo.png" alt="Bago City">
</div>

<div class="ui-top">
  <div class="search-wrap">
    <span class="search-ico" aria-hidden="true">🔍</span>
    <input class="si" id="srch" type="search" placeholder="Search waterfalls, parks, barangays..." autocomplete="off" enterkeyhint="search" onkeydown="if(event.key==='Enter'){event.preventDefault();doSearch(this.value,true);this.blur();}">
    <button class="search-clear" id="srch-clr" type="button" aria-label="Clear search" onclick="clearSearch()">×</button>
  </div>
  <div class="srch-drop" id="srch-drop">
    <div class="srch-popular" id="srch-popular">
      <div class="srch-popular-label">🔥 Popular Places</div>
      <div class="srch-popular-chips" id="quick-picks"></div>
    </div>
  </div>
  <div class="cw" id="filters">
    <button class="ch ca" data-f="all" onclick="doFilter('all',this)">🗺️ All</button>
    <button class="ch cs on" data-f="star" onclick="doFilter('star',this)">⭐ Must-See <span class="cnt" id="cnt-star"></span></button>
    <button class="ch ct" data-f="t" onclick="doFilter('t',this)">🏞️ Tourist Brgy</button>
    <button class="ch chh" data-f="heritage" onclick="doFilter('heritage',this)">🏛️ Heritage</button>
    <button class="ch cu" data-f="u" onclick="doFilter('u',this)">🏙️ Urban</button>
    <button class="ch cr" data-f="r" onclick="doFilter('r',this)">🌾 Rural</button>
    <button class="ch cl" data-f="city" onclick="doFilter('city',this)">🏢 City Services</button>
  </div>
</div>

<div class="legend" id="legend">
  <div class="legend-title">Map Legend</div>
  <div class="legend-row"><span class="legend-dot" style="background:linear-gradient(135deg,#ff8c00,#f39c12)"></span> Must-see attraction</div>
  <div class="legend-row"><span class="legend-dot" style="background:linear-gradient(135deg,#8e44ad,#9b59b6)"></span> Heritage site</div>
  <div class="legend-row"><span class="legend-dot" style="background:linear-gradient(135deg,#f39c12,#e67e22)"></span> Tourist barangay</div>
</div>

<div class="weather-widget" id="weather-widget">
  <div class="weather-icon" id="weather-icon">🌤️</div>
  <div class="weather-info">
    <div class="weather-temp" id="weather-temp">--°C</div>
    <div class="weather-desc" id="weather-desc">Loading...</div>
  </div>
  <button class="weather-refresh" onclick="loadWeather()" aria-label="Refresh weather">🔄</button>
</div>

<div class="fabs">
  <button class="fab ftour" id="btn-tour" onclick="doFilter('star',document.querySelector('[data-f=star]'))">⭐ Highlights</button>
  <button class="fab floc" id="btn-loc" onclick="locateUser()">📍 My Location</button>
  <button class="fab fdark" id="btn-dark" onclick="toggleDarkMode()">🌙 Dark</button>
  <button class="fab f3d" id="btn3d" onclick="do3D()">🏔️ 3D View</button>
  <button class="fab fhome" onclick="doHome()">🎯 Overview</button>
</div>

<div class="ov" id="ov" onclick="hidePan()"></div>
<div class="pan" id="pan">
  <button class="pc" onclick="hidePan()" aria-label="Close">×</button>

const QUICK_PICKS=[
  {q:"Kipot Twin Falls",  label:"💧 Kipot Falls",  lng:123.0706, lat:10.4788},

  {q:"Poblacion",        label:"🏙️ Poblacion",      lng:122.8353, lat:10.5402},
  {q:"Mailum",           label:"🏞️ Mailum",         lng:123.0494, lat:10.4636}
];

const CENTER=[122.950,10.510];
const BOUNDS=[[122.67,10.28],[123.25,10.70]];
const INITIAL_ZOOM=11.2;
const BM=[],LM=[];
let is3D=false,activeEl=null,activeFilter="star",searchIndex=[];

function spotTier(s){return s.tier||(s.cat==="Tourist Spot"||s.cat==="Park"||s.cat==="Nature Park"?"star":s.cat==="Heritage"||s.cat==="Religious"?"heritage":"city")}
function isStarSpot(s){return spotTier(s)==="star"}
function isHeritageSpot(s){return spotTier(s)==="heritage"}

const map=new mapboxgl.Map({
  container:"map",
  style:"mapbox://styles/mapbox/outdoors-v12",
  center:CENTER,
  zoom:INITIAL_ZOOM,
  minZoom:10.5,
  maxZoom:17,
  maxBounds:BOUNDS
});
map.setPadding({top:200,bottom:90});

map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),"bottom-right");

function buildSearchIndex(){
  searchIndex=[];
  BARANGAYS.forEach(b=>{
    searchIndex.push({kind:"barangay",name:b.name,sub:b.type==="t"?"Tourist Barangay":"Barangay "+b.num,icon:"📍",tier:"barangay",lng:b.lng,lat:b.lat,data:b,searchText:[b.name,b.spots,b.desc,b.fiesta].join(" ").toLowerCase()});
  });
  SPOTS_DEDUPED.forEach(s=>{
    const t=spotTier(s);
    searchIndex.push({kind:"spot",name:s.name,sub:s.cat,icon:s.icon,tier:t,lng:s.lng,lat:s.lat,data:s,searchText:[s.name,s.cat,s.desc,s.spots].join(" ").toLowerCase()});
  });
}

function initQuickPicks(){
  const el=document.getElementById("quick-picks");
  el.innerHTML=QUICK_PICKS.map(p=>`<button class="qp star" type="button" data-q="${p.q}">${p.label}</button>`).join("");
  el.querySelectorAll(".qp").forEach(btn=>{
    const p=QUICK_PICKS.find(x=>x.q===btn.dataset.q);
    btn.onclick=()=>{
      // Set search text
      document.getElementById("srch").value=p.q;
      document.getElementById("srch-clr").classList.add("on");
      document.getElementById("srch-drop").classList.remove("on");
      // Fly directly to the known coordinates — no fuzzy search
      map.flyTo({center:[p.lng,p.lat],zoom:16,duration:900,essential:true});
      // Find and highlight the matching marker
      const hitLM=LM.find(x=>x.s.name===p.q);
      const hitBM=BM.find(x=>x.b.name===p.q);
      const hit=hitLM||hitBM;
      if(hit){
        if(activeEl&&activeEl!==hit.el)activeEl.classList.remove("sel");
        activeEl=hit.el;
        hit.el.classList.add("sel");
      }
    };
  });
}

function initFilterCounts(){
  const urbanCount=BARANGAYS.filter(b=>b.type==='u').length;
  const ruralCount=BARANGAYS.filter(b=>b.type==='r').length;
  const touristCount=BARANGAYS.filter(b=>b.type==='t').length;
  const starCount=SPOTS.filter(s=>spotTier(s)==='star').length;
  const heritageCount=SPOTS.filter(s=>spotTier(s)==='heritage').length;
  const cityCount=SPOTS.filter(s=>spotTier(s)==='city').length;
  
  document.querySelector('[data-f="u"]').innerHTML=`🏙️ Urban <span class="cnt">${urbanCount}</span>`;
  document.querySelector('[data-f="r"]').innerHTML=`🌾 Rural <span class="cnt">${ruralCount}</span>`;
  document.querySelector('[data-f="t"]').innerHTML=`🏞️ Tourist Brgy <span class="cnt">${touristCount}</span>`;
  document.querySelector('[data-f="star"]').innerHTML=`⭐ Must-See <span class="cnt">${starCount}</span>`;
  document.querySelector('[data-f="heritage"]').innerHTML=`🏛️ Heritage <span class="cnt">${heritageCount}</span>`;
  document.querySelector('[data-f="city"]').innerHTML=`🏢 City Services <span class="cnt">${cityCount}</span>`;
}

document.getElementById("srch").addEventListener("input",e=>doSearch(e.target.value,false));
document.getElementById("srch").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();doSearch(e.target.value,true);e.target.blur();}});
document.getElementById("srch").addEventListener("focus",()=>{
  const v=document.getElementById("srch").value;
  if(v){
    doSearch(v,false);
  } else {
    // Show popular picks when search is empty and focused
    const drop=document.getElementById("srch-drop");
    drop.classList.add("on");
    document.getElementById("srch-popular").style.display="block";
  }
});
document.getElementById("srch").addEventListener("blur",()=>{
  // Small delay so clicks on items register first
  setTimeout(()=>{
    if(!document.getElementById("srch").value){
      document.getElementById("srch-drop").classList.remove("on");
    }
  },200);
});

document.getElementById("cnt-star").textContent=SPOTS_DEDUPED.filter(isStarSpot).length;
document.getElementById("spot-count").textContent=SPOTS_DEDUPED.filter(isStarSpot).length+" must-see";

map.on("load",()=>{
  const ldr=document.getElementById("ldr");
  ldr.classList.add("done");
  setTimeout(()=>ldr.style.display="none",600);
  initFilterCounts();
  loadWeather();
  loadEvents();

  map.addSource("dem",{type:"raster-dem",url:"mapbox://mapbox.mapbox-terrain-dem-v1",tileSize:512});
  map.setTerrain({source:"dem",exaggeration:0.5});
  // Reduced fog effects for better performance
  map.setFog({color:"rgb(255,230,200)","horizon-blend":.08,"high-color":"rgb(180,120,80)","space-color":"rgb(30,20,40)","star-intensity":.2});

  BARANGAYS.forEach((b,i)=>{
    const el=document.createElement("div");
    el.className="bp "+b.type;
    el.innerHTML="<div class=bpill>"+b.name+"</div>";
    el.style.animationDelay=(i*30)+"ms";
    el.onclick=()=>onTap(el,b.lng,b.lat,()=>{});
    new mapboxgl.Marker({element:el,anchor:"center"}).setLngLat([b.lng,b.lat]).addTo(map);
    BM.push({el,b});
  });

  SPOTS_DEDUPED.forEach((s,i)=>{
    const t=spotTier(s);
    const el=document.createElement("div");
    el.className="lm lm-"+t;
    el.style.animationDelay=((BARANGAYS.length+i)*30)+"ms";
    const sh=s.name.length>14?s.name.slice(0,13)+"…":s.name;
    el.innerHTML="<div class=lmi>"+s.icon+"</div><div class=lmt>"+sh+"</div>";
    const info={name:s.name,type:"landmark",cat:s.cat,tier:t,icon:s.icon,desc:s.desc,spots:s.spots,dist:"",pop:"",area:"",fiesta:""};
    el.onclick=()=>onTap(el,s.lng,s.lat,()=>{});
    new mapboxgl.Marker({element:el,anchor:"top"}).setLngLat([s.lng,s.lat]).addTo(map);
    LM.push({el,s,info,t});
  });

  buildSearchIndex();
  initQuickPicks();

  function syncZ(){
    const z=map.getZoom();
    BM.forEach(({el})=>{
      if(el.classList.contains("dim"))return;
      if(activeFilter==="star"||activeFilter==="heritage"||activeFilter==="city"){el.style.opacity="0";el.style.pointerEvents="none";return;}
      el.style.opacity=z<10.8?"0":z<11.2?"0.45":"1";
      el.style.pointerEvents=z<10.8?"none":"auto";
    });
    LM.forEach(({el,t})=>{
      if(el.classList.contains("dim"))return;
      if(t==="star"){el.style.opacity="1";el.style.pointerEvents="auto";return;}
      el.style.opacity=z<11?"0.35":z<11.8?"0.7":"1";
      el.style.pointerEvents=z<10.8?"none":"auto";
    });
  }
  map.on("zoom",syncZ);

  doFilter("star",document.querySelector('[data-f="star"]'));

  setTimeout(()=>{
    map.easeTo({pitch:25,duration:1400});
    setTimeout(()=>map.easeTo({pitch:0,duration:1000}),2200);
  },500);
});

function onTap(el,lng,lat,cb){
  if(activeEl&&activeEl!==el)activeEl.classList.remove("sel");
  activeEl=el;el.classList.add("sel");
  map.easeTo({center:[lng,lat],zoom:Math.max(map.getZoom(),14),duration:600,easing:t=>1-Math.pow(1-t,3)});
  setTimeout(cb,300);
}

function applyMarkerVisibility(type){
  activeFilter=type;
  BM.forEach(({el,b})=>{
    let show=false;
    if(type==="all")show=true;
    else if(type==="u")show=b.type==="u";
    else if(type==="r")show=b.type==="r";
    else if(type==="t")show=b.type==="t";
    el.classList.toggle("dim",!show);
    if(show){el.style.opacity="1";el.style.pointerEvents="auto";}
    else el.style.opacity="";
  });
  LM.forEach(({el,t})=>{
    let show=false;
    if(type==="all")show=true;
    else if(type==="star")show=t==="star";
    else if(type==="heritage")show=t==="heritage";
    else if(type==="city")show=t==="city";
    else show=false;
    el.classList.toggle("dim",!show);
    if(show){el.style.opacity="1";el.style.pointerEvents="auto";}
    else el.style.opacity="";
  });
}

function fitToVisible(){
  const coords=[];
  BM.forEach(({el,b})=>{if(!el.classList.contains("dim"))coords.push([b.lng,b.lat]);});
  LM.forEach(({el,s})=>{if(!el.classList.contains("dim"))coords.push([s.lng,s.lat]);});
  if(coords.length<2)return;
  const bounds=coords.reduce((b,c)=>b.extend(c),new mapboxgl.LngLatBounds(coords[0],coords[0]));
  map.fitBounds(bounds,{padding:{top:220,bottom:100,left:40,right:40},duration:900,maxZoom:14});
}

function doFilter(type,chip){
  document.querySelectorAll(".ch").forEach(c=>c.classList.remove("on"));
  if(chip)chip.classList.add("on");
  applyMarkerVisibility(type);
  if(type==="star"||type==="heritage"||type==="t")fitToVisible();
  else if(type!=="all")map.flyTo({center:CENTER,zoom:INITIAL_ZOOM,duration:800});
  map.fire("zoom");
}

function highlightMatch(text,q){
  if(!q)return text;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return text;
  return text.slice(0,i)+'<span class="srch-hl">'+text.slice(i,i+q.length)+"</span>"+text.slice(i+q.length);
}

function selectSearchResult(item){
  document.getElementById("srch-drop").classList.remove("on");
  document.getElementById("srch").value=item.name;
  document.getElementById("srch-clr").classList.add("on");
  
  // Fly to location and highlight marker — tap marker to see details
  map.flyTo({center:[item.lng,item.lat],zoom:16,duration:900,essential:true});
  
  // Highlight the marker
  if(item.kind==="barangay"){
    const hit=BM.find(x=>x.b.name===item.name);
    if(hit){
      if(activeEl&&activeEl!==hit.el)activeEl.classList.remove("sel");
      activeEl=hit.el;
      hit.el.classList.add("sel");
    }
  }else{
    const hit=LM.find(x=>x.s.name===item.name);
    if(hit){
      if(activeEl&&activeEl!==hit.el)activeEl.classList.remove("sel");
      activeEl=hit.el;
      hit.el.classList.add("sel");
    }
  }
}

// Debounce timer
let _searchTimer = null;

function doSearch(v,openFirst){
  // Debounce — wait 300ms after user stops typing
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(()=>_doSearchNow(v,openFirst), 300);
}

function _doSearchNow(v,openFirst){
  const q=v.trim();
  const clr=document.getElementById("srch-clr");
  const drop=document.getElementById("srch-drop");
  clr.classList.toggle("on",!!q);

  if(!q){
    drop.classList.remove("on");
    applyMarkerVisibility(activeFilter);
    return;
  }

  // Hide popular picks when typing
  const popular=document.getElementById("srch-popular");
  if(popular) popular.style.display="none";

  document.querySelectorAll(".ch").forEach(c=>c.classList.remove("on"));
  const ql=q.toLowerCase();
  // Get all matches, then sort: name matches first, spot/desc matches second
  const allMatches=searchIndex.filter(item=>item.searchText.includes(ql));
  allMatches.sort((a,b)=>{
    const aName=a.name.toLowerCase().includes(ql)?0:1;
    const bName=b.name.toLowerCase().includes(ql)?0:1;
    return aName-bName;
  });
  const matches=allMatches.slice(0,8);

  BM.forEach(({el,b})=>{
    const m=b.name.toLowerCase().includes(ql)||(b.spots&&b.spots.toLowerCase().includes(ql))||b.desc.toLowerCase().includes(ql);
    el.classList.toggle("dim",!m);
    el.style.opacity=m?"1":"";
    el.style.pointerEvents=m?"auto":"none";
  });
  LM.forEach(({el,s})=>{
    const m=s.name.toLowerCase().includes(ql)||s.cat.toLowerCase().includes(ql)||s.desc.toLowerCase().includes(ql)||(s.spots&&s.spots.toLowerCase().includes(ql));
    el.classList.toggle("dim",!m);
    el.style.opacity=m?"1":"";
    el.style.pointerEvents=m?"auto":"none";
  });

  if(matches.length){
    drop.innerHTML=matches.map((item,i)=>{
      const icoClass=item.tier==="star"?"star":item.tier==="heritage"?"heritage":item.tier==="barangay"?"barangay":"city";
      return `<div class="srch-item" data-idx="${i}"><div class="srch-item-ico ${icoClass}">${item.icon}</div><div class="srch-item-body"><div class="srch-item-name">${highlightMatch(item.name,q)}</div><div class="srch-item-sub">${item.sub}</div></div></div>`;
    }).join("");
    drop.classList.add("on");
    drop.querySelectorAll(".srch-item").forEach((row,i)=>row.onclick=()=>selectSearchResult(matches[i]));
    // Only auto-fly if user pressed Enter (openFirst=true), not while typing
    if(openFirst && matches[0]) selectSearchResult(matches[0]);
  }else{
    drop.innerHTML='<div class="srch-empty">No results — try "falls", "park", or a barangay name</div>';
    drop.classList.add("on");
  }
}

function clearSearch(){
  document.getElementById("srch").value="";
  document.getElementById("srch-clr").classList.remove("on");
  document.getElementById("srch-drop").classList.remove("on");
  const popular=document.getElementById("srch-popular");
  if(popular) popular.style.display="none";
  applyMarkerVisibility(activeFilter);
  document.querySelector('[data-f="'+activeFilter+'"]')?.classList.add("on");
}

function do3D(){
  is3D=!is3D;
  const btn=document.getElementById("btn3d");
  if(is3D){
    map.easeTo({pitch:58,bearing:-20,duration:900});

  }else{
    map.easeTo({pitch:0,bearing:0,duration:800});
    btn.innerHTML="🏔️ 3D View";

}

function doHome(){
  map.flyTo({center:CENTER,zoom:INITIAL_ZOOM,pitch:0,bearing:0,duration:1500,easing:(t)=>t<.5?2*t*t:-1+(4-2*t)*t/2});
  doFilter('all',document.querySelector('[data-f="all"]'));
}

function locateUser(){
  if(!navigator.geolocation){
    alert('Geolocation is not supported by your browser');
    return;
  }
  
  const btn=document.getElementById('btn-loc');
  btn.innerHTML='🔄 Locating...';
  btn.disabled=true;
  
  navigator.geolocation.getCurrentPosition(
    position=>{
      const{lng,lat}=position.coords;
      map.flyTo({center:[lng,lat],zoom:15,duration:1200});
      
      new mapboxgl.Marker({color:'#3498db'})
        .setLngLat([lng,lat])
        .setPopup(new mapboxgl.Popup({offset:25}).setHTML('<div style="padding:8px;font-size:12px;font-weight:700;color:#333">📍 You are here</div>'))
        .addTo(map);
      
      btn.innerHTML='📍 My Location';
      btn.disabled=false;
    },
    error=>{
      let msg='Unable to retrieve your location';
      switch(error.code){
        case error.PERMISSION_DENIED:
          msg='Location access denied. Please enable location services in your browser settings.';
          break;
        case error.POSITION_UNAVAILABLE:
          msg='Location information is unavailable.';
          break;
        case error.TIMEOUT:
          msg='Location request timed out.';
          break;
      }
      alert(msg);
      btn.innerHTML='📍 My Location';
      btn.disabled=false;
    },
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    }
  );
}

function toggleDarkMode(){

  const isDark=document.body.classList.contains('dark-mode');
  btn.innerHTML=isDark?'☀️ Light':'🌙 Dark';

    map.setStyle('mapbox://styles/mapbox/dark-v11');

    map.setStyle('mapbox://styles/mapbox/outdoors-v12');
  }

  localStorage.setItem('bago_dark_mode',isDark);
}

function showPan(p){
  const isBrgy=!!p.num;
  const isLm=p.type==="landmark";
  const tier=p.tier||(isBrgy?(p.type==="t"?"barangay":"barangay"):isLm?spotTier(p):"city");

  document.getElementById("pname").textContent=p.name;
  const icoEl=document.getElementById("pan-ico");
  icoEl.textContent=isLm?(p.icon||"📍"):(p.type==="t"?"🏞️":"📍");
  icoEl.className="pan-ico "+(isLm?(p.tier||"city"):p.type==="t"?"star":"barangay");

  const t=document.getElementById("ptype");
  if(isBrgy){
    t.textContent=p.type==="u"?"🏙️ Urban Barangay":p.type==="t"?"⭐ Tourist Barangay":"🌾 Rural Barangay";
    t.style.background=p.type==="u"?"rgba(231,76,60,.2)":p.type==="t"?"rgba(243,156,18,.25)":"rgba(39,174,96,.2)";
    t.style.color=p.type==="u"?"#ff7675":p.type==="t"?"#fdcb6e":"#55efc4";
  }else{
    const labels={star:"⭐ Must-See Attraction",heritage:"🏛️ Heritage Site",city:"🏢 City Service"};
    t.textContent=labels[p.tier]||"📍 "+p.cat;
    t.style.background=p.tier==="star"?"rgba(243,156,18,.25)":p.tier==="heritage"?"rgba(142,68,173,.25)":"rgba(52,152,219,.2)";
    t.style.color=p.tier==="star"?"#fdcb6e":p.tier==="heritage"?"#d7bde2":"#74b9ff";
  }

  document.getElementById("pdesc").textContent=p.desc||"";
  const f=[];
  if(p.num)f.push("🔢 Brgy. No. "+p.num);
  if(p.dist&&p.dist!=="—")f.push("📍 "+p.dist+" from city");
  if(p.pop&&p.pop!=="—")f.push("👥 Pop. "+p.pop);
  if(p.area&&p.area!=="—")f.push("📐 "+p.area);
  if(p.fiesta&&p.fiesta!=="—")f.push("🎉 "+p.fiesta);
  document.getElementById("pfacts").innerHTML=f.map(x=>"<span class=fp>"+x+"</span>").join("");
  document.getElementById("pspots").innerHTML=p.spots?p.spots.split("|").map(s=>"<span class=sp>"+s.trim()+"</span>").join(""):"";
  document.getElementById("pgm").href="https://maps.google.com/?q="+encodeURIComponent(p.name+" Bago City Negros Occidental");
  document.getElementById("pan").classList.add("on");
  document.getElementById("ov").classList.add("on");
}

function hidePan(){
  document.getElementById("pan").classList.remove("on");
  document.getElementById("ov").classList.remove("on");
  if(activeEl){activeEl.classList.remove("sel");activeEl=null;}
}
